name: Inspect stable release runs

on:
  pull_request:
    paths:
      - ".github/workflows/inspect-stable-release-runs.yml"

permissions:
  contents: read
  actions: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Extract latest failed publication error
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          run_id="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/publish-stable-request.yml/runs?event=push&status=failure&per_page=1" --jq '.workflow_runs[0].id')"
          job_id="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs" --jq '.jobs[] | select(.conclusion == "failure") | .id' | head -n 1)"
          echo "FAILED_RUN_ID=${run_id}"
          echo "FAILED_JOB_ID=${job_id}"
          gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs" > failed-job.log
          echo "--- TRACEBACK CONTEXT ---"
          grep -n -A30 -B15 'Traceback' failed-job.log || true
          echo "--- FAILURE WINDOW 360-420 ---"
          sed -n '360,420p' failed-job.log
          echo "--- FAILURE WINDOW 420-470 ---"
          sed -n '420,470p' failed-job.log
