name: Stable autofix

on:
  push:
    branches:
      - feature/stable-0.3.0
    paths:
      - ".stable-format-trigger"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/stable-0.3.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip -r requirements_test.txt
      - name: Apply safe Ruff fixes and formatting
        run: |
          ruff check . --fix
          ruff format .
      - name: Commit formatting and remove temporary trigger
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -f .stable-format-trigger .github/workflows/stable-autofix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: apply stable Ruff formatting"
          git push origin HEAD:feature/stable-0.3.0
