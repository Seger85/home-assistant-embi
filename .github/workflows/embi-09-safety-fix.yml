name: EMBi 0.9 safety correction

on:
  push:
    branches:
      - feature/embi-0.9.0
    paths:
      - .github/workflows/embi-09-safety-fix.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/embi-0.9.0
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install -q --upgrade pip -r requirements_test.txt
      - name: Apply safety corrections
        run: |
          python - <<'PY'
          from pathlib import Path

          devices = Path("custom_components/emby/options_devices.py")
          text = devices.read_text(encoding="utf-8")
          text = text.replace(
              "    CONF_AUTO_SHOW_NEW_PLAYERS,\n",
              "    CONF_ALLOWED_DEVICE_IDS,\n    CONF_AUTO_SHOW_NEW_PLAYERS,\n",
          )
          text = text.replace(
              "from .player_context import ACTIVE_PLAYBACK_STATES, GROUP_USER_PREFIX, group_player_catalog\n",
              "from .player_context import (\n    ACTIVE_PLAYBACK_STATES,\n    CLIENT_CLASS_TECHNICAL,\n    GROUP_USER_PREFIX,\n    group_player_catalog,\n)\n",
          )
          old = '''        if user_input is not None and not errors:\n            self._draft_options[CONF_GLOBAL_PLAYER_MODE] = (\n                PLAYER_MODE_ACTIVE_ONLY\n                if user_input.get(CONF_ONLY_DURING_PLAYBACK)\n                else PLAYER_MODE_PERSISTENT\n            )\n            self._draft_options[CONF_AUTO_SHOW_NEW_PLAYERS] = bool(\n                user_input.get(CONF_AUTO_SHOW_NEW_PLAYERS, True)\n            )\n            self._draft_options[CONF_TECHNICAL_ACCESS_VISIBILITY] = bool(\n                user_input.get(CONF_TECHNICAL_ACCESS_VISIBILITY, False)\n            )\n            self._search_query = str(user_input.get(CONF_SEARCH_QUERY, "")).strip()\n            selected_group = user_input.get(CONF_SELECTED_GROUP)\n            if selected_group == _OLDER_RULES_GROUP:\n                return await self.async_step_older_rules()\n            if selected_group:\n                self._selected_group = str(selected_group)\n                return await self.async_step_player_group()\n            return await self.async_step_init()\n'''
          new = '''        if user_input is not None and not errors:\n            requested_technical = bool(\n                user_input.get(CONF_TECHNICAL_ACCESS_VISIBILITY, False)\n            )\n            active_technical = [\n                player\n                for player in players\n                if player.client_class == CLIENT_CLASS_TECHNICAL\n                and player.playback in ACTIVE_PLAYBACK_STATES\n                and player.visible_in_embi\n            ]\n            if not requested_technical and active_technical:\n                errors["base"] = "playback_protected"\n            else:\n                self._draft_options[CONF_GLOBAL_PLAYER_MODE] = (\n                    PLAYER_MODE_ACTIVE_ONLY\n                    if user_input.get(CONF_ONLY_DURING_PLAYBACK)\n                    else PLAYER_MODE_PERSISTENT\n                )\n                auto_show = bool(user_input.get(CONF_AUTO_SHOW_NEW_PLAYERS, True))\n                self._draft_options[CONF_AUTO_SHOW_NEW_PLAYERS] = auto_show\n                if not auto_show:\n                    allowed = {\n                        str(value)\n                        for value in self._draft_options.get(CONF_ALLOWED_DEVICE_IDS, [])\n                    }\n                    allowed.update(\n                        player.player_key for player in players if player.visible_in_embi\n                    )\n                    self._draft_options[CONF_ALLOWED_DEVICE_IDS] = sorted(allowed)\n                self._draft_options[CONF_TECHNICAL_ACCESS_VISIBILITY] = (\n                    requested_technical\n                )\n                self._search_query = str(\n                    user_input.get(CONF_SEARCH_QUERY, "")\n                ).strip()\n                selected_group = user_input.get(CONF_SELECTED_GROUP)\n                if selected_group == _OLDER_RULES_GROUP:\n                    return await self.async_step_older_rules()\n                if selected_group:\n                    self._selected_group = str(selected_group)\n                    return await self.async_step_player_group()\n                return await self.async_step_init()\n'''
          if old not in text:
              raise SystemExit("Devices submission block not found")
          text = text.replace(old, new)
          old = '''        if user_input is not None and not errors:\n            selected = {\n                str(value) for value in user_input.get(CONF_VISIBLE_PLAYER_KEYS, [])\n            }\n            if any(\n                player.playback in ACTIVE_PLAYBACK_STATES\n                and player.player_key not in selected\n                for player in group_players\n            ):\n                errors["base"] = "playback_protected"\n            else:\n'''
          new = '''        if user_input is not None and not errors:\n            selected = {\n                str(value) for value in user_input.get(CONF_VISIBLE_PLAYER_KEYS, [])\n            }\n            hide_user_group = user_name is not None and not bool(\n                user_input.get("show_user_players", True)\n            )\n            active_group = [\n                player\n                for player in group_players\n                if player.playback in ACTIVE_PLAYBACK_STATES\n            ]\n            if (hide_user_group and active_group) or any(\n                player.playback in ACTIVE_PLAYBACK_STATES\n                and player.player_key not in selected\n                for player in group_players\n            ):\n                errors["base"] = "playback_protected"\n            else:\n'''
          if old not in text:
              raise SystemExit("Player group protection block not found")
          text = text.replace(old, new)
          text = text.replace(
              '{"value": value, "label": f"Legacy rule {index}"}',
              '{\n                "value": value,\n                "label": (\n                    f"Ältere Regel {index}"\n                    if self._is_de()\n                    else f"Older rule {index}"\n                ),\n            }',
          )
          devices.write_text(text, encoding="utf-8")

          flow = Path("custom_components/emby/options_flow.py")
          text = flow.read_text(encoding="utf-8")
          text = text.replace(
              "from .const import CONF_HIDDEN_EXACT_PLAYERS, CONF_SERVER_AUTO_CLEANUP_ENABLED\n",
              "from .const import (\n    CONF_ALLOWED_DEVICE_IDS,\n    CONF_AUTO_SHOW_NEW_PLAYERS,\n    CONF_HIDDEN_EXACT_PLAYERS,\n    CONF_SERVER_AUTO_CLEANUP_ENABLED,\n    CONF_TECHNICAL_ACCESS_VISIBILITY,\n    CONF_USER_MASTER_VISIBILITY,\n)\n",
          )
          text = text.replace(
              "from .player_context import ACTIVE_PLAYBACK_STATES\n",
              "from .player_context import ACTIVE_PLAYBACK_STATES, CLIENT_CLASS_TECHNICAL\n",
          )
          needle = '''        if protected_keys:\n            after_hidden -= protected_keys\n            updated[CONF_HIDDEN_EXACT_PLAYERS] = sorted(after_hidden)\n\n        original_auto = bool(original.get(CONF_SERVER_AUTO_CLEANUP_ENABLED, False))\n'''
          replacement = '''        if protected_keys:\n            after_hidden -= protected_keys\n            updated[CONF_HIDDEN_EXACT_PLAYERS] = sorted(after_hidden)\n\n        active_players = [\n            player\n            for player in players\n            if player.playback in ACTIVE_PLAYBACK_STATES and player.visible_in_embi\n        ]\n        if not bool(updated.get(CONF_AUTO_SHOW_NEW_PLAYERS, True)):\n            allowed = {\n                str(value) for value in updated.get(CONF_ALLOWED_DEVICE_IDS, [])\n            }\n            allowed.update(player.player_key for player in active_players)\n            updated[CONF_ALLOWED_DEVICE_IDS] = sorted(allowed)\n        if not bool(updated.get(CONF_TECHNICAL_ACCESS_VISIBILITY, False)):\n            protected_technical = {\n                player.player_key\n                for player in active_players\n                if player.client_class == CLIENT_CLASS_TECHNICAL\n            }\n            if protected_technical:\n                updated[CONF_TECHNICAL_ACCESS_VISIBILITY] = True\n                protected_keys.update(protected_technical)\n        user_visibility = dict(updated.get(CONF_USER_MASTER_VISIBILITY, {}))\n        for player in active_players:\n            if len(player.users) == 1 and user_visibility.get(player.users[0]) is False:\n                user_visibility[player.users[0]] = True\n                protected_keys.add(player.player_key)\n        updated[CONF_USER_MASTER_VISIBILITY] = user_visibility\n\n        original_auto = bool(original.get(CONF_SERVER_AUTO_CLEANUP_ENABLED, False))\n'''
          if needle not in text:
              raise SystemExit("Apply protection insertion point not found")
          flow.write_text(text.replace(needle, replacement), encoding="utf-8")

          diagnostics = Path("custom_components/emby/diagnostics.py")
          text = diagnostics.read_text(encoding="utf-8")
          text = text.replace(
              "from homeassistant.const import CONF_API_KEY\n",
              "from homeassistant.const import CONF_API_KEY, CONF_HOST\n",
          )
          text = text.replace('"title": entry.title,', '"title": "<redacted>",')
          text = text.replace(
              "async_redact_data(dict(entry.data), {CONF_API_KEY})",
              "async_redact_data(dict(entry.data), {CONF_API_KEY, CONF_HOST})",
          )
          diagnostics.write_text(text, encoding="utf-8")

          tests = Path("tests/test_repository_contract.py")
          text = tests.read_text(encoding="utf-8")
          text = text.replace(
              'assert "async_redact_data(dict(entry.data), {CONF_API_KEY})" in diagnostics',
              'assert "async_redact_data(dict(entry.data), {CONF_API_KEY, CONF_HOST})" in diagnostics',
          )
          tests.write_text(text, encoding="utf-8")
          PY
          rm .github/workflows/embi-09-safety-fix.yml
          ruff check --fix --unsafe-fixes .
          ruff format .
          pytest -q
      - name: Commit safety correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "fix: preserve active players and redact server identity"
          git push origin HEAD:feature/embi-0.9.0
