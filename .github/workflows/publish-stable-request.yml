name: Publish stable release request

on:
  pull_request:
    paths:
      - ".github/workflows/publish-stable-request.yml"
      - ".github/release-requests/*.yml"
  push:
    branches:
      - main
    paths:
      - ".github/release-requests/*.yml"
  workflow_dispatch:
    inputs:
      request:
        description: Release-request filename
        required: true
        type: string

concurrency:
  group: publish-stable-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-definition:
    name: Validate stable release workflow definition
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Validate request schema and workflow YAML
        run: |
          python -m pip install --disable-pip-version-check PyYAML==6.0.3
          python - <<'PY'
          from pathlib import Path
          import re
          import yaml

          workflow = Path(".github/workflows/publish-stable-request.yml")
          yaml.load(workflow.read_text(encoding="utf-8"), Loader=yaml.BaseLoader)

          request = Path(".github/release-requests/v0.9.1.yml")
          data = yaml.safe_load(request.read_text(encoding="utf-8"))
          required = {"version", "tag", "title", "target_sha", "stable", "prerelease"}
          if not isinstance(data, dict) or required - data.keys():
              raise SystemExit("Invalid stable release request")
          if data["tag"] != f"v{data['version']}":
              raise SystemExit("Tag/version mismatch")
          if not re.fullmatch(r"[0-9a-f]{40}", str(data["target_sha"])):
              raise SystemExit("target_sha must be a full SHA")
          if data["stable"] is not True or data["prerelease"] is not False:
              raise SystemExit("Request is not stable")
          PY

  publish:
    name: Validate, publish and verify stable release
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Check out main with complete history and tags
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install release dependencies
        run: python -m pip install --upgrade pip -r requirements_test.txt

      - name: Resolve stable release request
        env:
          DISPATCH_REQUEST: ${{ github.event.inputs.request }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            request_path=".github/release-requests/${DISPATCH_REQUEST##*/}"
          else
            mapfile -t requests < <(
              git diff-tree --no-commit-id --name-only -r "${GITHUB_SHA}" |
                grep -E '^\.github/release-requests/[^/]+\.yml$' || true
            )
            test "${#requests[@]}" -eq 1
            request_path="${requests[0]}"
          fi
          test -f "${request_path}"

          python - "${request_path}" "${GITHUB_ENV}" <<'PY'
          from pathlib import Path
          import re
          import sys
          import yaml

          path = Path(sys.argv[1])
          env_file = Path(sys.argv[2])
          data = yaml.safe_load(path.read_text(encoding="utf-8"))
          required = {"version", "tag", "title", "target_sha", "stable", "prerelease"}
          if not isinstance(data, dict):
              raise SystemExit("Release request must be a mapping")
          missing = sorted(required - data.keys())
          if missing:
              raise SystemExit(f"Missing keys: {missing}")

          version = str(data["version"])
          tag = str(data["tag"])
          title = str(data["title"])
          target = str(data["target_sha"]).lower()
          report_issue = int(data.get("report_issue", 30))

          if not re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+", version):
              raise SystemExit("Invalid stable version")
          if tag != f"v{version}" or title != f"EMBi {version}":
              raise SystemExit("Release identity mismatch")
          if not re.fullmatch(r"[0-9a-f]{40}", target):
              raise SystemExit("target_sha must be a full SHA")
          if data["stable"] is not True or data["prerelease"] is not False:
              raise SystemExit("Only stable non-prerelease requests are accepted")

          with env_file.open("a", encoding="utf-8") as output:
              output.write(f"VERSION={version}\n")
              output.write(f"TAG={tag}\n")
              output.write(f"TITLE={title}\n")
              output.write(f"TARGET_SHA={target}\n")
              output.write(f"REPORT_ISSUE={report_issue}\n")
          PY

      - name: Validate target and release contract
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin main:refs/remotes/origin/main
          git cat-file -e "${TARGET_SHA}^{commit}"
          git merge-base --is-ancestor "${TARGET_SHA}" origin/main
          git checkout --detach "${TARGET_SHA}"

          test "$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path("custom_components/emby/manifest.json").read_text(encoding="utf-8"))["version"])
          PY
          )" = "${VERSION}"

          test "$(python - <<'PY'
          import re
          from pathlib import Path

          constants = Path("custom_components/emby/const.py").read_text(encoding="utf-8")
          match = re.search(r'^VERSION = "([^"]+)"$', constants, re.MULTILINE)
          if match is None:
              raise SystemExit("const.py does not expose a literal VERSION")
          print(match.group(1))
          PY
          )" = "${VERSION}"

          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path("hacs.json").read_text(encoding="utf-8"))
          assert data.get("zip_release") is True
          assert data.get("filename") == "embi.zip"
          PY

      - name: Run complete quality and contract validation
        run: |
          python -m json.tool custom_components/emby/manifest.json >/dev/null
          python -m json.tool custom_components/emby/strings.json >/dev/null
          python -m json.tool custom_components/emby/translations/de.json >/dev/null
          python -m json.tool custom_components/emby/translations/en.json >/dev/null
          python -m json.tool hacs.json >/dev/null
          python -m compileall -q custom_components/emby scripts tests
          mypy --ignore-missing-imports --follow-imports=skip \
            custom_components/emby/options_model.py \
            custom_components/emby/player_context.py \
            custom_components/emby/options_runtime.py
          ruff check .
          ruff format --check .
          pytest -q
          python scripts/validate_spec_contract.py
          python scripts/validate_stable_contract.py
          python scripts/secret_scan.py

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          comment: false
          ignore: brands description license topics

      - name: Hassfest
        uses: home-assistant/actions/hassfest@master

      - name: Build and verify release assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist verify-release
          python scripts/build_package.py \
            --output-dir dist \
            --expected-version "${VERSION}" \
            --commit "${TARGET_SHA}"
          (cd dist && sha256sum --check embi.zip.sha256)
          test "$(cat dist/BUILD_COMMIT)" = "${TARGET_SHA}"

          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import zipfile

          with zipfile.ZipFile(Path("dist/embi.zip")) as archive:
              names = set(archive.namelist())
              required = {
                  "__init__.py",
                  "manifest.json",
                  "strings.json",
                  "translations/de.json",
                  "translations/en.json",
              }
              if required - names:
                  raise SystemExit("Published package would miss required files")
              forbidden = [
                  name for name in names
                  if name.startswith(("tests/", "docs/", ".github/", "custom_components/"))
                  or "__pycache__" in name
                  or name.endswith((".pyc", ".pyo"))
              ]
              if forbidden:
                  raise SystemExit(f"Forbidden package files: {forbidden}")
              manifest = json.loads(archive.read("manifest.json"))
              if manifest.get("version") != os.environ["VERSION"]:
                  raise SystemExit("Package manifest version mismatch")
          PY

          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          match = re.search(
              rf"^## \[{re.escape(version)}\][^\n]*\n(?P<body>.*?)(?=^## \[|\Z)",
              changelog,
              re.MULTILINE | re.DOTALL,
          )
          if not match:
              raise SystemExit("Missing changelog section")
          Path("dist/release-notes.md").write_text(
              f"# EMBi {version}\n\n{match.group('body').strip()}\n",
              encoding="utf-8",
          )
          PY

      - name: Create or verify immutable release tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
            test "$(git rev-list -n 1 "${TAG}")" = "${TARGET_SHA}"
          else
            git tag "${TAG}" "${TARGET_SHA}"
            git push origin "refs/tags/${TAG}"
          fi

      - name: Publish or complete stable release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            json="$(gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" --json name,isDraft,isPrerelease)"
            jq -e --arg title "${TITLE}" \
              '.name == $title and .isDraft == false and .isPrerelease == false' \
              <<<"${json}" >/dev/null

            for asset in embi.zip embi.zip.sha256; do
              if ! gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" \
                --jq ".assets[] | select(.name == \"${asset}\") | .name" |
                grep -qx "${asset}"; then
                gh release upload "${TAG}" "dist/${asset}" --repo "${GITHUB_REPOSITORY}"
              fi
            done
            id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" --jq .id)"
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${id}" \
              -f make_latest=true >/dev/null
          else
            gh release create "${TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --title "${TITLE}" \
              --notes-file dist/release-notes.md \
              --latest \
              dist/embi.zip \
              dist/embi.zip.sha256
          fi

      - name: Verify published release and provenance
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}")"
          jq -e --arg tag "${TAG}" --arg title "${TITLE}" \
            '.tag_name == $tag and .name == $title and .draft == false and .prerelease == false' \
            <<<"${json}" >/dev/null
          jq -e \
            '.assets | length == 2 and any(.name == "embi.zip") and any(.name == "embi.zip.sha256")' \
            <<<"${json}" >/dev/null
          test "$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)" = "${TAG}"

          git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
          test "$(git rev-list -n 1 "${TAG}")" = "${TARGET_SHA}"

          mkdir verify-release
          gh release download "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir verify-release \
            --pattern embi.zip \
            --pattern embi.zip.sha256
          (cd verify-release && sha256sum --check embi.zip.sha256)
          cmp dist/embi.zip verify-release/embi.zip
          cmp dist/embi.zip.sha256 verify-release/embi.zip.sha256

          sha="$(sha256sum verify-release/embi.zip | cut -d' ' -f1)"
          zip_size="$(jq -r '.assets[] | select(.name == "embi.zip") | .size' <<<"${json}")"
          checksum_size="$(jq -r '.assets[] | select(.name == "embi.zip.sha256") | .size' <<<"${json}")"
          url="$(jq -r .html_url <<<"${json}")"
          build_commit="$(cat dist/BUILD_COMMIT)"
          test "${build_commit}" = "${TARGET_SHA}"

          cat > release-result.env <<EOF
          RELEASE_URL=${url}
          ZIP_SIZE=${zip_size}
          CHECKSUM_SIZE=${checksum_size}
          ZIP_SHA256=${sha}
          BUILD_COMMIT=${build_commit}
          EOF

      - name: Remove temporary release branches
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          branches=(
            "release/0.9.1"
            "release/v0.9.1"
            "fix/publish-v0.9.1"
            "fix/retrigger-v0.9.1"
            "fix/release-workflow-v0.9.1"
            "fix/observe-release-v0.9.1"
            "fix/publish-v0.9.1-validation"
          )
          for branch in "${branches[@]}"; do
            endpoint="repos/${GITHUB_REPOSITORY}/git/refs/heads/${branch}"
            if gh api "${endpoint}" >/dev/null 2>&1; then
              gh api --method DELETE "${endpoint}" >/dev/null
            fi
            if gh api "${endpoint}" >/dev/null 2>&1; then
              echo "::error::Temporary branch ${branch} still exists."
              exit 1
            fi
          done

      - name: Report stable release result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        shell: bash
        run: |
          set -euo pipefail
          release_url="unavailable"
          zip_size="unavailable"
          checksum_size="unavailable"
          zip_sha256="unavailable"
          build_commit="unavailable"
          if [[ -f release-result.env ]]; then
            source release-result.env
            release_url="${RELEASE_URL}"
            zip_size="${ZIP_SIZE}"
            checksum_size="${CHECKSUM_SIZE}"
            zip_sha256="${ZIP_SHA256}"
            build_commit="${BUILD_COMMIT}"
          fi

          cat > release-report.md <<EOF
          <!-- embi-stable-release-report -->
          Stable release workflow: ${JOB_STATUS^^}
          Run ID: ${GITHUB_RUN_ID}
          Run URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          Workflow: ${GITHUB_WORKFLOW}
          Tag: ${TAG:-unresolved}
          Target SHA: ${TARGET_SHA:-unresolved}
          Release URL: ${release_url}
          embi.zip size: ${zip_size}
          embi.zip.sha256 size: ${checksum_size}
          embi.zip SHA-256: ${zip_sha256}
          BUILD_COMMIT: ${build_commit}
          EOF

          gh issue comment "${REPORT_ISSUE:-30}" \
            --repo "${GITHUB_REPOSITORY}" \
            --body-file release-report.md
          test "${JOB_STATUS}" = "success"
