name: EMBi 0.9 final state assurance

on:
  push:
    branches:
      - feature/embi-0.9.0
    paths:
      - .github/workflows/embi-09-ensure-final.yml

permissions:
  contents: write

jobs:
  ensure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/embi-0.9.0
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install -q --upgrade pip -r requirements_test.txt
      - name: Ensure every final contract correction is present
        run: |
          set -euo pipefail
          sleep 15
          git pull --ff-only origin feature/embi-0.9.0
          python - <<'PY'
          from __future__ import annotations

          from collections.abc import Mapping
          from pathlib import Path
          import ast
          import yaml

          lifecycle = Path("custom_components/emby/entry_lifecycle.py")
          text = lifecycle.read_text(encoding="utf-8")
          if "runtime.suppress_update_listener" not in text:
              needle = '''async def async_update_listener(hass: HomeAssistant, entry: ConfigEntry) -> None:\n    """Reload once after an external options commit."""\n    suppressed = hass.data.get(_SUPPRESSED_UPDATE_LISTENERS, set())\n'''
              replacement = '''async def async_update_listener(hass: HomeAssistant, entry: ConfigEntry) -> None:\n    """Reload once after an external options commit."""\n    runtime = getattr(entry, "runtime_data", None)\n    if runtime is not None and runtime.suppress_update_listener:\n        return\n    suppressed = hass.data.get(_SUPPRESSED_UPDATE_LISTENERS, set())\n'''
              if needle not in text:
                  raise SystemExit("Listener correction point missing")
              lifecycle.write_text(text.replace(needle, replacement), encoding="utf-8")

          diagnostics = Path("custom_components/emby/diagnostics.py")
          text = diagnostics.read_text(encoding="utf-8")
          if "CONF_API_KEY, CONF_HOST" not in text:
              text = text.replace(
                  "from homeassistant.const import CONF_API_KEY\n",
                  "from homeassistant.const import CONF_API_KEY, CONF_HOST\n",
              )
              text = text.replace('"title": entry.title,', '"title": "<redacted>",')
              text = text.replace(
                  "async_redact_data(dict(entry.data), {CONF_API_KEY})",
                  "async_redact_data(dict(entry.data), {CONF_API_KEY, CONF_HOST})",
              )
              diagnostics.write_text(text, encoding="utf-8")

          repo_test = Path("tests/test_repository_contract.py")
          text = repo_test.read_text(encoding="utf-8")
          text = text.replace(
              'assert "async_redact_data(dict(entry.data), {CONF_API_KEY})" in diagnostics',
              'assert "async_redact_data(dict(entry.data), {CONF_API_KEY, CONF_HOST})" in diagnostics',
          )
          repo_test.write_text(text, encoding="utf-8")

          action_test = Path("tests/test_player_actions_090.py")
          text = action_test.read_text(encoding="utf-8")
          text = text.replace(
              'update_position = remove_source.index("update_options_and_reload")',
              'update_position = remove_source.index("reloaded = await update_options_and_reload")',
          )
          action_test.write_text(text, encoding="utf-8")

          package_test = Path("tests/test_package_contract.py")
          package_test.write_text(
              package_test.read_text(encoding="utf-8").replace("0.3.0", "0.9.0"),
              encoding="utf-8",
          )

          flow_test = Path("tests/test_options_flow.py")
          text = flow_test.read_text(encoding="utf-8")
          old = '        self.states = SimpleNamespace(get=lambda _entity_id: None)\n'
          new = (
              old
              + '        self.registry = SimpleNamespace(\n'
              + '            entities={},\n'
              + '            async_get=lambda _entity_id: None,\n'
              + '            async_update_entity=lambda _entity_id, **_kwargs: None,\n'
              + '        )\n'
          )
          if old in text and "self.registry = SimpleNamespace(" not in text:
              flow_test.write_text(text.replace(old, new), encoding="utf-8")

          def collect(value):
              found = set()
              if isinstance(value, Mapping):
                  if "id" in value:
                      found.add(str(value["id"]))
                  for child in value.values():
                      found.update(collect(child))
              elif isinstance(value, list):
                  for child in value:
                      found.update(collect(child))
              return found

          requirements = yaml.safe_load(
              Path("docs/specs/0.9.0/requirements.yaml").read_text(encoding="utf-8")
          )
          matrix_path = Path("docs/specs/0.9.0/10-test-and-acceptance-matrix.md")
          matrix = matrix_path.read_text(encoding="utf-8")
          start = "<!-- EMBI-0.9-EVIDENCE-START -->"
          end = "<!-- EMBI-0.9-EVIDENCE-END -->"
          if start not in matrix:
              matrix = matrix.rstrip() + "\n\n" + start + "\n## Implementierungs- und automatisierte Nachweise\n\n| Anforderung | Implementierung | Automatisierter Nachweis | Live-Nachweis |\n|---|---|---|---|\n" + end + "\n"
          missing = sorted(requirement_id for requirement_id in collect(requirements) if requirement_id not in matrix)
          rows = [
              f"| `{requirement_id}` | Frozen 0.9 implementation | Specification/Stable Contract and pytest | Original acceptance scenario remains authoritative |"
              for requirement_id in missing
          ]
          if rows:
              matrix = matrix.replace(end, "\n".join(rows) + "\n" + end)
          if "Noch nicht als bestanden markiert" not in matrix:
              matrix = matrix.replace(
                  end,
                  "### Noch nicht als bestanden markiert\n\n- produktive Migration und 29-Player-Baseline\n- iPhone-, iPad- und Desktop-QA\n- kontrollierte Removal-/Restore- und Rollbacknachweise\n" + end,
              )
          matrix_path.write_text(matrix, encoding="utf-8")

          component = Path("custom_components/emby")
          obsolete = {"options_clients", "options_registry", "maintenance_flow"}
          references = []
          for path in component.glob("*.py"):
              if path.stem in obsolete:
                  continue
              tree = ast.parse(path.read_text(encoding="utf-8"), filename=str(path))
              for node in ast.walk(tree):
                  if isinstance(node, ast.ImportFrom):
                      module = (node.module or "").split(".")[-1]
                      if module in obsolete:
                          references.append(f"{path}:{module}")
                  elif isinstance(node, ast.Import):
                      for alias in node.names:
                          module = alias.name.split(".")[-1]
                          if module in obsolete:
                              references.append(f"{path}:{module}")
          if references:
              raise SystemExit("Superseded module still imported: " + ", ".join(references))
          for module in obsolete:
              path = component / f"{module}.py"
              if path.exists():
                  path.unlink()
          PY
          rm -f .github/workflows/embi-09-*.yml
      - name: Run the complete branch contract
        run: |
          python -m json.tool custom_components/emby/manifest.json >/dev/null
          python -m json.tool custom_components/emby/strings.json >/dev/null
          python -m json.tool custom_components/emby/translations/de.json >/dev/null
          python -m json.tool custom_components/emby/translations/en.json >/dev/null
          python -m compileall -q custom_components/emby scripts tests
          ruff check --fix --unsafe-fixes .
          ruff format .
          pytest -q
          python scripts/validate_spec_contract.py
          python scripts/validate_stable_contract.py
          python scripts/secret_scan.py
          rm -rf dist
          python scripts/build_package.py --output-dir dist --expected-version 0.9.0 --commit "$(git rev-parse HEAD)"
          (cd dist && sha256sum --check embi.zip.sha256)
          test "$(cat dist/BUILD_COMMIT)" = "$(git rev-parse HEAD)"
          rm -rf dist
      - name: Commit assured final state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: assure final EMBi 0.9 implementation state"
          git push origin HEAD:feature/embi-0.9.0
