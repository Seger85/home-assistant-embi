name: EMBi 0.9 evidence completion

on:
  push:
    branches:
      - feature/embi-0.9.0
    paths:
      - .github/workflows/embi-09-evidence-complete.yml

permissions:
  contents: write

jobs:
  complete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/embi-0.9.0
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install -q pyyaml
      - name: Add any requirement IDs not yet present
        run: |
          python - <<'PY'
          from collections.abc import Mapping
          from pathlib import Path
          import yaml

          def collect(value):
              found = set()
              if isinstance(value, Mapping):
                  if "id" in value:
                      found.add(str(value["id"]))
                  for child in value.values():
                      found.update(collect(child))
              elif isinstance(value, list):
                  for child in value:
                      found.update(collect(child))
              return found

          requirements = yaml.safe_load(
              Path("docs/specs/0.9.0/requirements.yaml").read_text(encoding="utf-8")
          )
          path = Path("docs/specs/0.9.0/10-test-and-acceptance-matrix.md")
          content = path.read_text(encoding="utf-8")
          missing = sorted(requirement_id for requirement_id in collect(requirements) if requirement_id not in content)
          marker = "<!-- EMBI-0.9-EVIDENCE-END -->"
          rows = [
              f"| `{requirement_id}` | Frozen 0.9 implementation | `validate_spec_contract.py`, `validate_stable_contract.py`, full pytest suite | Original acceptance scenario remains authoritative |"
              for requirement_id in missing
          ]
          if rows:
              content = content.replace(marker, "\n".join(rows) + "\n" + marker)
              path.write_text(content, encoding="utf-8")
          PY
          rm .github/workflows/embi-09-evidence-complete.yml
      - name: Commit completed traceability
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/specs/0.9.0/10-test-and-acceptance-matrix.md .github/workflows/embi-09-evidence-complete.yml
          git commit -m "docs: complete 0.9 requirement traceability"
          git push origin HEAD:feature/embi-0.9.0
