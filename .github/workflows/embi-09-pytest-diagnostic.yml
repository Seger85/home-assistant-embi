name: EMBi 0.9 pytest diagnostic

on:
  pull_request:
    paths:
      - .github/workflows/embi-09-pytest-diagnostic.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install -q --upgrade pip -r requirements_test.txt
      - name: Capture pytest output
        run: |
          set +e
          pytest -q > pytest-output.txt 2>&1
          status=$?
          cat pytest-output.txt
          echo "pytest_status=${status}" >> pytest-output.txt
          test -s pytest-output.txt
      - uses: actions/upload-artifact@v4
        with:
          name: embi-09-pytest-diagnostic-${{ github.sha }}
          path: pytest-output.txt
          retention-days: 1
