name: EMBi 0.9 listener correction

on:
  push:
    branches:
      - feature/embi-0.9.0
    paths:
      - .github/workflows/embi-09-listener-fix.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/embi-0.9.0
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install -q --upgrade pip -r requirements_test.txt
      - name: Restore runtime-scoped listener suppression
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("custom_components/emby/entry_lifecycle.py")
          text = path.read_text(encoding="utf-8")
          needle = '''async def async_update_listener(hass: HomeAssistant, entry: ConfigEntry) -> None:\n    """Reload once after an external options commit."""\n    suppressed = hass.data.get(_SUPPRESSED_UPDATE_LISTENERS, set())\n'''
          replacement = '''async def async_update_listener(hass: HomeAssistant, entry: ConfigEntry) -> None:\n    """Reload once after an external options commit."""\n    runtime = getattr(entry, "runtime_data", None)\n    if runtime is not None and runtime.suppress_update_listener:\n        return\n    suppressed = hass.data.get(_SUPPRESSED_UPDATE_LISTENERS, set())\n'''
          if needle not in text:
              raise SystemExit("Expected listener implementation not found")
          path.write_text(text.replace(needle, replacement), encoding="utf-8")
          PY
          rm .github/workflows/embi-09-listener-fix.yml
          ruff check --fix --unsafe-fixes .
          ruff format .
          pytest -q
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "fix: suppress the managed options reload exactly once"
          git push origin HEAD:feature/embi-0.9.0
