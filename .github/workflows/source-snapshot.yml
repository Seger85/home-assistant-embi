name: Source snapshot

on:
  pull_request:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Upload repository snapshot
        uses: actions/upload-artifact@v4
        with:
          name: source-${{ github.sha }}
          path: |
            .
            !.git/**
            !dist/**
          include-hidden-files: true
          retention-days: 1
