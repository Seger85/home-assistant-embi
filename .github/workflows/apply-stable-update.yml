name: Apply stable update

on:
  push:
    branches:
      - feature/stable-0.3.0
    paths:
      - .stable-update.tar.xz.b64

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v7
        with:
          ref: feature/stable-0.3.0
          fetch-depth: 0

      - name: Apply and validate stable source
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .stable-update.tar.xz.b64 > /tmp/stable-update.tar.xz
          tar -xJf /tmp/stable-update.tar.xz -C .
          rm -f .stable-update.tar.xz.b64 .github/workflows/apply-stable-update.yml
          python -m pip install -q --upgrade pip -r requirements_test.txt
          python -m compileall -q custom_components/emby scripts tests
          ruff check .
          ruff format --check .
          pytest -q
          python scripts/validate_stable_contract.py
          python scripts/secret_scan.py
          rm -rf dist
          python scripts/build_package.py --output-dir dist --expected-version 0.3.0 --commit "$GITHUB_SHA"
          (cd dist && sha256sum --check embi.zip.sha256)

      - name: Commit completed stable implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "feat: complete stable 0.3.0 pre-live implementation"
          git push origin HEAD:feature/stable-0.3.0
