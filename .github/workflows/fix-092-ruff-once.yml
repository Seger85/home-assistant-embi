name: Fix EMBi 0.9.2 lint once

on:
  pull_request:
    paths:
      - "scripts/fix_092_ruff.py"
      - ".github/workflows/fix-092-ruff-once.yml"

permissions:
  contents: write
  pull-requests: read

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install Ruff
        run: python -m pip install --upgrade ruff==0.12.7
      - name: Apply lint correction
        run: python scripts/fix_092_ruff.py
      - name: Commit corrected source
        run: |
          set -euo pipefail
          git config user.name "Seger"
          git config user.email "35084198+Seger85@users.noreply.github.com"
          git add custom_components/emby/options_cleanup.py \
                  custom_components/emby/options_flow.py \
                  custom_components/emby/options_ha_cleanup.py \
                  custom_components/emby/options_navigation.py
          if git diff --cached --quiet; then
            echo "No lint correction required."
            exit 0
          fi
          git commit -m "fix: resolve 0.9.2 lint findings"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
