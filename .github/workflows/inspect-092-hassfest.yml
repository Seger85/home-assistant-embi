name: Fix EMBi 0.9.2 translations

on:
  pull_request:
    paths:
      - "scripts/fix_092_translations.py"
      - ".github/workflows/inspect-092-hassfest.yml"

permissions:
  contents: write
  pull-requests: read

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Align Options Flow translations
        run: python scripts/fix_092_translations.py
      - name: Commit translation correction
        run: |
          set -euo pipefail
          git config user.name "Seger"
          git config user.email "35084198+Seger85@users.noreply.github.com"
          git add custom_components/emby/strings.json custom_components/emby/translations/en.json custom_components/emby/translations/de.json
          git diff --cached --quiet && exit 0
          git commit -m "fix: align Options Flow translation schema"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
