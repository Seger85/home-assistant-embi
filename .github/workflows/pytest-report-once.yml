name: Capture final EMBi 0.9 pytest report once

on:
  push:
    branches:
      - feature/embi-0.9.0
    paths:
      - .github/workflows/pytest-report-once.yml

permissions:
  contents: read

jobs:
  pytest-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/embi-0.9.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install -q --upgrade pip -r requirements_test.txt
      - name: Capture full pytest result
        id: pytest
        shell: bash
        run: |
          set +e
          pytest -q > pytest-report.txt 2>&1
          status=$?
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          cat pytest-report.txt
          exit 0
      - name: Upload pytest report
        uses: actions/upload-artifact@v4
        with:
          name: embi-09-final-pytest-report-${{ github.sha }}
          path: pytest-report.txt
          retention-days: 1
      - name: Enforce pytest result
        if: ${{ steps.pytest.outputs.status != '0' }}
        run: exit 1
