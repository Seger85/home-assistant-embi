name: Format EMBi 0.9.1 once

on:
  push:
    branches:
      - release/0.9.1
    paths:
      - .github/workflows/format-091-once.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: release/0.9.1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install -q ruff==0.15.21
      - run: ruff format .
      - run: rm .github/workflows/format-091-once.yml
      - name: Commit formatted sources
        run: |
          git config user.name "Seger"
          git config user.email "35084198+Seger85@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -s -m "style: format EMBi 0.9.1 sources"
          git push origin HEAD:release/0.9.1
