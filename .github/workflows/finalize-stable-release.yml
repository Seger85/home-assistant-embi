name: Finalize stable release

on:
  workflow_run:
    workflows:
      - Publish stable release request
    types:
      - completed

concurrency:
  group: finalize-stable-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  finalize:
    name: Verify release and clean temporary branches
    if: github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out current main with complete history
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install release dependencies
        run: python -m pip install --upgrade pip -r requirements_test.txt

      - name: Resolve the completed release request
        env:
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --tags origin main:refs/remotes/origin/main
          git cat-file -e "${SOURCE_SHA}^{commit}"
          git merge-base --is-ancestor "${SOURCE_SHA}" origin/main

          mapfile -t requests < <(
            git diff-tree --no-commit-id --name-only -r "${SOURCE_SHA}" |
              grep -E '^\.github/release-requests/[^/]+\.yml$' || true
          )
          test "${#requests[@]}" -eq 1
          request_path="${requests[0]}"
          git show "${SOURCE_SHA}:${request_path}" > release-request.yml

          python - "${GITHUB_ENV}" <<'PY'
          from pathlib import Path
          import re
          import sys
          import yaml

          env_file = Path(sys.argv[1])
          data = yaml.safe_load(Path("release-request.yml").read_text(encoding="utf-8"))
          required = {
              "version",
              "tag",
              "title",
              "target_sha",
              "stable",
              "prerelease",
              "cleanup_branches",
          }
          if not isinstance(data, dict):
              raise SystemExit("Release request must be a mapping")
          missing = sorted(required - data.keys())
          if missing:
              raise SystemExit(f"Missing release-request keys: {missing}")

          version = str(data["version"])
          tag = str(data["tag"])
          title = str(data["title"])
          target = str(data["target_sha"]).lower()
          report_issue = int(data.get("report_issue", 30))
          branches = data["cleanup_branches"]

          if not re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+", version):
              raise SystemExit("Invalid stable version")
          if tag != f"v{version}" or title != f"EMBi {version}":
              raise SystemExit("Release identity mismatch")
          if not re.fullmatch(r"[0-9a-f]{40}", target):
              raise SystemExit("target_sha must be a full SHA")
          if data["stable"] is not True or data["prerelease"] is not False:
              raise SystemExit("Only stable releases can be finalized")
          if not isinstance(branches, list) or not all(isinstance(item, str) for item in branches):
              raise SystemExit("cleanup_branches must be a string list")
          if any(item in {"main", "develop"} for item in branches):
              raise SystemExit("Protected branches cannot be cleanup targets")
          if any(not item.startswith(("fix/", "release/")) for item in branches):
              raise SystemExit("Cleanup targets must use fix/ or release/")

          with env_file.open("a", encoding="utf-8") as output:
              output.write(f"VERSION={version}\n")
              output.write(f"TAG={tag}\n")
              output.write(f"TITLE={title}\n")
              output.write(f"TARGET_SHA={target}\n")
              output.write(f"REPORT_ISSUE={report_issue}\n")

          Path("cleanup-branches.txt").write_text(
              "".join(f"{branch}\n" for branch in branches),
              encoding="utf-8",
          )
          PY

      - name: Validate target, versions and HACS contract
        shell: bash
        run: |
          set -euo pipefail
          git cat-file -e "${TARGET_SHA}^{commit}"
          git merge-base --is-ancestor "${TARGET_SHA}" origin/main
          git checkout --detach "${TARGET_SHA}"

          test "$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path("custom_components/emby/manifest.json").read_text(encoding="utf-8"))["version"])
          PY
          )" = "${VERSION}"

          test "$(python - <<'PY'
          import re
          from pathlib import Path
          constants = Path("custom_components/emby/const.py").read_text(encoding="utf-8")
          match = re.search(r'^VERSION = "([^"]+)"$', constants, re.MULTILINE)
          if match is None:
              raise SystemExit("Missing literal VERSION in const.py")
          print(match.group(1))
          PY
          )" = "${VERSION}"

          python - <<'PY'
          import json
          from pathlib import Path
          hacs = json.loads(Path("hacs.json").read_text(encoding="utf-8"))
          if hacs.get("zip_release") is not True:
              raise SystemExit("hacs.json must set zip_release=true")
          if hacs.get("filename") != "embi.zip":
              raise SystemExit("hacs.json filename must be embi.zip")
          PY

      - name: Rebuild deterministic package
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist verify-release
          python scripts/build_package.py \
            --output-dir dist \
            --expected-version "${VERSION}" \
            --commit "${TARGET_SHA}"
          (cd dist && sha256sum --check embi.zip.sha256)
          test "$(cat dist/BUILD_COMMIT)" = "${TARGET_SHA}"

      - name: Verify public stable release and assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          release_json="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}")"
          jq -e --arg tag "${TAG}" --arg title "${TITLE}" \
            '.tag_name == $tag and .name == $title and .draft == false and .prerelease == false' \
            <<<"${release_json}" >/dev/null
          jq -e \
            '.assets | length == 2 and any(.name == "embi.zip") and any(.name == "embi.zip.sha256")' \
            <<<"${release_json}" >/dev/null
          test "$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)" = "${TAG}"

          git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
          test "$(git rev-list -n 1 "${TAG}")" = "${TARGET_SHA}"

          mkdir verify-release
          gh release download "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir verify-release \
            --pattern embi.zip \
            --pattern embi.zip.sha256
          (cd verify-release && sha256sum --check embi.zip.sha256)
          cmp dist/embi.zip verify-release/embi.zip
          cmp dist/embi.zip.sha256 verify-release/embi.zip.sha256

          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import zipfile

          with zipfile.ZipFile(Path("verify-release/embi.zip")) as archive:
              names = set(archive.namelist())
              required = {
                  "__init__.py",
                  "manifest.json",
                  "strings.json",
                  "translations/de.json",
                  "translations/en.json",
              }
              missing = sorted(required - names)
              if missing:
                  raise SystemExit(f"Missing release files: {missing}")
              forbidden = sorted(
                  name
                  for name in names
                  if name.startswith(("tests/", "docs/", ".github/", "custom_components/"))
                  or "__pycache__" in name
                  or name.endswith((".pyc", ".pyo"))
              )
              if forbidden:
                  raise SystemExit(f"Forbidden release files: {forbidden}")
              manifest = json.loads(archive.read("manifest.json"))
              if manifest.get("version") != os.environ["VERSION"]:
                  raise SystemExit("Published manifest version mismatch")
          PY

          zip_sha256="$(sha256sum verify-release/embi.zip | cut -d' ' -f1)"
          zip_size="$(jq -r '.assets[] | select(.name == "embi.zip") | .size' <<<"${release_json}")"
          checksum_size="$(jq -r '.assets[] | select(.name == "embi.zip.sha256") | .size' <<<"${release_json}")"
          release_url="$(jq -r .html_url <<<"${release_json}")"
          build_commit="$(cat dist/BUILD_COMMIT)"
          test "${build_commit}" = "${TARGET_SHA}"

          cat > final-release-result.env <<EOF
          RELEASE_URL=${release_url}
          ZIP_SIZE=${zip_size}
          CHECKSUM_SIZE=${checksum_size}
          ZIP_SHA256=${zip_sha256}
          BUILD_COMMIT=${build_commit}
          EOF

      - name: Delete and verify temporary release branches
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r branch; do
            [[ -n "${branch}" ]] || continue
            if git ls-remote --exit-code --heads origin "refs/heads/${branch}" >/dev/null 2>&1; then
              git push origin --delete "${branch}"
            fi
            if git ls-remote --exit-code --heads origin "refs/heads/${branch}" >/dev/null 2>&1; then
              echo "::error::Temporary branch ${branch} still exists."
              exit 1
            fi
          done < cleanup-branches.txt

      - name: Report final release verification
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
          SOURCE_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        shell: bash
        run: |
          set -euo pipefail
          release_url="unavailable"
          zip_size="unavailable"
          checksum_size="unavailable"
          zip_sha256="unavailable"
          build_commit="unavailable"
          if [[ -f final-release-result.env ]]; then
            source final-release-result.env
            release_url="${RELEASE_URL}"
            zip_size="${ZIP_SIZE}"
            checksum_size="${CHECKSUM_SIZE}"
            zip_sha256="${ZIP_SHA256}"
            build_commit="${BUILD_COMMIT}"
          fi

          cat > final-release-report.md <<EOF
          <!-- embi-stable-release-finalizer-report -->
          Stable release finalizer: ${JOB_STATUS^^}
          Finalizer run ID: ${GITHUB_RUN_ID}
          Finalizer URL: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          Source publication run ID: ${SOURCE_RUN_ID}
          Source publication conclusion: ${SOURCE_CONCLUSION}
          Tag: ${TAG:-unresolved}
          Target SHA: ${TARGET_SHA:-unresolved}
          Release URL: ${release_url}
          embi.zip size: ${zip_size}
          embi.zip.sha256 size: ${checksum_size}
          embi.zip SHA-256: ${zip_sha256}
          BUILD_COMMIT: ${build_commit}
          EOF

          gh issue comment "${REPORT_ISSUE:-30}" \
            --repo "${GITHUB_REPOSITORY}" \
            --body-file final-release-report.md
          test "${JOB_STATUS}" = "success"
