name: Apply EMBi 0.9.2 implementation

on:
  pull_request:
    paths:
      - "scripts/apply_092_patch.py"
      - ".github/workflows/apply-embi-0.9.2.yml"

permissions:
  contents: write
  pull-requests: read

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Apply surgical 0.9.2 patch
        run: python scripts/apply_092_patch.py
      - name: Commit generated implementation branch
        run: |
          git config user.name "Seger"
          git config user.email "35084198+Seger85@users.noreply.github.com"
          git add -A -- ':!.github/workflows/apply-embi-0.9.2.yml' ':!scripts/apply_092_patch.py'
          git commit -m "fix: repair EMBi 0.9.2 options flow"
          git push --force-with-lease origin "HEAD:refs/heads/generated/embi-0.9.2"
