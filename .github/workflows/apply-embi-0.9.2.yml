name: Apply EMBi 0.9.2 implementation

on:
  pull_request:
    paths:
      - "scripts/apply_092_patch.py"
      - ".github/workflows/apply-embi-0.9.2.yml"

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Apply surgical 0.9.2 patch
        run: python scripts/apply_092_patch.py
      - name: Format changed Python
        run: |
          python -m pip install -q ruff
          ruff check . --fix
          ruff format .
          python -m compileall -q custom_components/emby scripts tests
      - name: Remove temporary patch machinery
        run: |
          rm scripts/apply_092_patch.py
          rm .github/workflows/apply-embi-0.9.2.yml
      - name: Commit implementation
        run: |
          git config user.name "Seger"
          git config user.email "35084198+Seger85@users.noreply.github.com"
          git add -A
          git commit -m "fix: repair EMBi 0.9.2 options flow"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
