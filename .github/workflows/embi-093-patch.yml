name: EMBi 0.9.3 one-shot patch

on:
  push:
    branches:
      - bootstrap/embi-0.9.3

permissions:
  contents: write

jobs:
  patch-test-commit:
    if: ${{ !contains(github.event.head_commit.message, '[embi-093-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: bootstrap/embi-0.9.3
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - run: python -m pip install -q --upgrade pip -r requirements_test.txt
      - name: Apply 0.9.3 patch
        run: python .github/embi_093_patch.py
      - name: Remove one-shot patch files
        run: rm -f .github/embi_093_patch.py .github/workflows/embi-093-patch.yml
      - name: Format and lint
        run: |
          ruff format .
          ruff check . --fix
          ruff format --check .
          ruff check .
      - name: Compile and test
        run: |
          python -m compileall -q custom_components/emby scripts tests
          pytest -q
      - name: Validate JSON and YAML
        run: |
          python -m json.tool custom_components/emby/manifest.json >/dev/null
          python -m json.tool custom_components/emby/strings.json >/dev/null
          python -m json.tool custom_components/emby/translations/de.json >/dev/null
          python -m json.tool custom_components/emby/translations/en.json >/dev/null
      - name: Commit implementation
        run: |
          git config user.name "Seger"
          git config user.email "35084198+Seger85@users.noreply.github.com"
          git add -A
          git commit -m "EMBi 0.9.3: Streamline player controls and cleanup UX [embi-093-applied]" -m "Signed-off-by: Seger"
          git push origin HEAD:${GITHUB_REF_NAME}
