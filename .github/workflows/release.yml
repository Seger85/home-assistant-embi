name: Release package

on:
  push:
    tags:
      - "v*"
    branches:
      - "release/v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate release contract
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      release_branch: ${{ steps.release.outputs.release_branch }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Validate stable request, version and main ancestry
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            release_branch="false"
          elif [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == release/v* ]]; then
            tag="${GITHUB_REF_NAME#release/}"
            release_branch="true"
          else
            echo "::error::Stable release requires a v* tag or release/v* request branch."
            exit 1
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Stable release tag must use vMAJOR.MINOR.PATCH."
            exit 1
          fi

          version="${tag#v}"
          manifest_version="$(python - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path("custom_components/emby/manifest.json").read_text(encoding="utf-8"))["version"])
          PY
          )"
          internal_version="$(python - <<'PY'
          from custom_components.emby.const import VERSION
          print(VERSION)
          PY
          )"

          if [[ "${version}" != "${manifest_version}" || "${version}" != "${internal_version}" ]]; then
            echo "::error::Tag, manifest and internal version must match exactly."
            exit 1
          fi

          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Stable release commit must be contained in main."
            exit 1
          fi

          if [[ "${release_branch}" == "true" ]] && \
             git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists."
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "release_branch=${release_branch}" >> "${GITHUB_OUTPUT}"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip -r requirements_test.txt

      - name: Validate JSON and YAML
        run: |
          python -m json.tool custom_components/emby/manifest.json >/dev/null
          python -m json.tool custom_components/emby/strings.json >/dev/null
          python -m json.tool custom_components/emby/translations/de.json >/dev/null
          python -m json.tool custom_components/emby/translations/en.json >/dev/null
          python -m json.tool hacs.json >/dev/null
          python - <<'PY'
          from pathlib import Path
          import yaml
          paths = [Path(".github/dependabot.yml")]
          paths.extend(sorted(Path(".github/workflows").glob("*.yml")))
          for path in paths:
              yaml.load(path.read_text(encoding="utf-8"), Loader=yaml.BaseLoader)
          PY

      - name: Compile and type check
        run: |
          python -m compileall -q custom_components/emby scripts tests
          mypy --ignore-missing-imports --follow-imports=skip \
            custom_components/emby/options_model.py \
            custom_components/emby/player_context.py \
            custom_components/emby/options_runtime.py

      - name: Ruff lint and format
        run: |
          ruff check .
          ruff format --check .

      - name: Unit and contract tests
        run: |
          pytest -q
          python scripts/validate_spec_contract.py
          python scripts/validate_stable_contract.py
          python scripts/secret_scan.py

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hacs/action@main
        with:
          category: integration
          comment: false
          ignore: brands description license topics

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: home-assistant/actions/hassfest@master

  release:
    name: Publish GitHub release
    needs:
      - validate
      - hacs
      - hassfest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Build and verify stable assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          python scripts/build_package.py \
            --output-dir dist \
            --expected-version "${{ needs.validate.outputs.version }}" \
            --commit "${GITHUB_SHA}"
          (cd dist && sha256sum --check embi.zip.sha256)
          test "$(cat dist/BUILD_COMMIT)" = "${GITHUB_SHA}"

      - name: Publish stable release and assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: EMBi ${{ needs.validate.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/embi.zip
            dist/embi.zip.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: false
          draft: false
          make_latest: true

      - name: Verify published release and assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          release_json="$(gh release view "${RELEASE_TAG}" --json tagName,name,isDraft,isPrerelease,assets)"
          jq -e --arg tag "${RELEASE_TAG}" '.tagName == $tag' <<<"${release_json}" >/dev/null
          jq -e --arg name "EMBi ${RELEASE_VERSION}" '.name == $name' <<<"${release_json}" >/dev/null
          jq -e '.isDraft == false and .isPrerelease == false' <<<"${release_json}" >/dev/null
          jq -e '.assets | length == 2 and any(.name == "embi.zip") and any(.name == "embi.zip.sha256")' <<<"${release_json}" >/dev/null

          rm -rf verify-release
          mkdir verify-release
          gh release download "${RELEASE_TAG}" \
            --dir verify-release \
            --pattern embi.zip \
            --pattern embi.zip.sha256
          (cd verify-release && sha256sum --check embi.zip.sha256)
          cmp dist/embi.zip verify-release/embi.zip
          cmp dist/embi.zip.sha256 verify-release/embi.zip.sha256

          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import zipfile

          with zipfile.ZipFile(Path("verify-release/embi.zip")) as archive:
              manifest = json.loads(archive.read("manifest.json"))
          if manifest.get("version") != os.environ["RELEASE_VERSION"]:
              raise RuntimeError("Published archive version differs")
          PY

          latest_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)"
          test "${latest_tag}" = "${RELEASE_TAG}"
          git fetch --force origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          test "$(git rev-list -n 1 "${RELEASE_TAG}")" = "${GITHUB_SHA}"

      - name: Remove verified release request branch
        if: ${{ needs.validate.outputs.release_branch == 'true' }}
        env:
          RELEASE_BRANCH: ${{ github.ref_name }}
        shell: bash
        run: git push origin --delete "${RELEASE_BRANCH}"
