name: Release package

on:
  push:
    tags:
      - "v*"
    branches:
      - "release/v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate release contract
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      release_branch: ${{ steps.release.outputs.release_branch }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Validate release request, manifest and source branch
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            release_branch="false"
          elif [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == release/v* ]]; then
            tag="${GITHUB_REF_NAME#release/}"
            release_branch="true"
          else
            echo "::error::Release workflow requires a v* tag or release/v* branch."
            exit 1
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must use vMAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH-PRERELEASE."
            exit 1
          fi

          version="${tag#v}"
          manifest_version="$(python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(
              Path("custom_components/emby/manifest.json").read_text(encoding="utf-8")
          )
          print(manifest["version"])
          PY
          )"

          if [[ "${version}" != "${manifest_version}" ]]; then
            echo "::error::Release ${tag} does not match manifest version ${manifest_version}."
            exit 1
          fi

          git fetch --no-tags origin \
            main:refs/remotes/origin/main \
            develop:refs/remotes/origin/develop

          if [[ "${version}" == *-* ]]; then
            prerelease="true"
            required_ref="origin/develop"
          else
            prerelease="false"
            required_ref="origin/main"
          fi

          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "${required_ref}"; then
            echo "::error::Release ${tag} must point to a commit contained in ${required_ref}."
            exit 1
          fi

          if [[ "${release_branch}" == "true" ]] && \
             git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists."
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "release_branch=${release_branch}" >> "${GITHUB_OUTPUT}"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip -r requirements_test.txt

      - name: Validate JSON and YAML
        run: |
          python -m json.tool custom_components/emby/manifest.json >/dev/null
          python -m json.tool custom_components/emby/strings.json >/dev/null
          python -m json.tool custom_components/emby/translations/de.json >/dev/null
          python -m json.tool custom_components/emby/translations/en.json >/dev/null
          python -m json.tool hacs.json >/dev/null
          python - <<'PY'
          from pathlib import Path
          import yaml

          paths = [Path(".github/dependabot.yml")]
          paths.extend(sorted(Path(".github/workflows").glob("*.yml")))
          for path in paths:
              yaml.load(path.read_text(encoding="utf-8"), Loader=yaml.BaseLoader)
          PY

      - name: Compile Python
        run: python -m compileall -q custom_components/emby scripts tests

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Unit tests
        run: pytest -q

      - name: Validate stable contract
        run: python scripts/validate_stable_contract.py

      - name: Secret and privacy scan
        run: python scripts/secret_scan.py

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hacs/action@main
        with:
          category: integration
          comment: false
          ignore: brands description license topics

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: home-assistant/actions/hassfest@master

  release:
    name: Publish GitHub release
    needs:
      - validate
      - hacs
      - hassfest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Build and verify release-equivalent assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          python scripts/build_package.py \
            --output-dir dist \
            --expected-version "${{ needs.validate.outputs.version }}" \
            --commit "${GITHUB_SHA}"
          (cd dist && sha256sum --check embi.zip.sha256)
          test "$(cat dist/BUILD_COMMIT)" = "${GITHUB_SHA}"

      - name: Publish release and assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/embi.zip
            dist/embi.zip.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: ${{ needs.validate.outputs.prerelease == 'true' }}
          make_latest: ${{ needs.validate.outputs.prerelease == 'true' && 'false' || 'true' }}

      - name: Verify published release metadata, assets and tag target
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          EXPECTED_PRERELEASE: ${{ needs.validate.outputs.prerelease }}
        shell: bash
        run: |
          set -euo pipefail

          release_json="$(gh release view "${RELEASE_TAG}" --json tagName,isPrerelease,assets)"
          jq -e --arg tag "${RELEASE_TAG}" '.tagName == $tag' <<<"${release_json}" >/dev/null
          jq -e '.assets | any(.name == "embi.zip")' <<<"${release_json}" >/dev/null
          jq -e '.assets | any(.name == "embi.zip.sha256")' <<<"${release_json}" >/dev/null
          jq -e '.assets | length == 2' <<<"${release_json}" >/dev/null

          actual_prerelease="$(jq -r '.isPrerelease' <<<"${release_json}")"
          if [[ "${actual_prerelease}" != "${EXPECTED_PRERELEASE}" ]]; then
            echo "::error::Published prerelease state ${actual_prerelease} does not match ${EXPECTED_PRERELEASE}."
            exit 1
          fi

          rm -rf verify-release
          mkdir verify-release
          gh release download "${RELEASE_TAG}" \
            --dir verify-release \
            --pattern embi.zip \
            --pattern embi.zip.sha256
          (cd verify-release && sha256sum --check embi.zip.sha256)
          cmp dist/embi.zip verify-release/embi.zip
          cmp dist/embi.zip.sha256 verify-release/embi.zip.sha256

          python - <<'PY'
          import json
          import os
          from pathlib import Path
          import zipfile

          with zipfile.ZipFile(Path("verify-release/embi.zip")) as archive:
              manifest = json.loads(archive.read("manifest.json"))
          expected = os.environ["RELEASE_VERSION"]
          if manifest.get("version") != expected:
              raise RuntimeError(
                  f"Published archive version {manifest.get('version')!r} != {expected!r}"
              )
          PY

          git fetch --force origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          tag_commit="$(git rev-list -n 1 "${RELEASE_TAG}")"
          if [[ "${tag_commit}" != "${GITHUB_SHA}" ]]; then
            echo "::error::Tag target ${tag_commit} does not match ${GITHUB_SHA}."
            exit 1
          fi

          latest_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name 2>/dev/null || true)"
          if [[ "${EXPECTED_PRERELEASE}" == "true" && "${latest_tag}" == "${RELEASE_TAG}" ]]; then
            echo "::error::Prerelease ${RELEASE_TAG} must never be latest."
            exit 1
          fi
          if [[ "${EXPECTED_PRERELEASE}" == "false" && "${latest_tag}" != "${RELEASE_TAG}" ]]; then
            echo "::error::Stable release ${RELEASE_TAG} must be latest; current latest is ${latest_tag}."
            exit 1
          fi

      - name: Remove consumed release request branch
        if: ${{ needs.validate.outputs.release_branch == 'true' }}
        env:
          RELEASE_BRANCH: ${{ github.ref_name }}
        shell: bash
        run: git push origin --delete "${RELEASE_BRANCH}"
