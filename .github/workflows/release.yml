name: Stable release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: stable-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-package:
    name: Validate and package
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.identity.outputs.version }}
      tag: ${{ steps.identity.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - name: Resolve immutable release identity
        id: identity
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          version="${tag#v}"
          manifest_version="$(python -c 'import json; print(json.load(open("custom_components/emby/manifest.json"))["version"])')"
          internal_version="$(python -c 'from custom_components.emby.const import VERSION; print(VERSION)')"
          test "${version}" = "${manifest_version}"
          test "${version}" = "${internal_version}"
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
      - name: Install validation dependencies
        run: python -m pip install -q --upgrade pip -r requirements_test.txt
      - name: Run complete quality and contract validation
        run: |
          python -m json.tool custom_components/emby/manifest.json >/dev/null
          python -m json.tool custom_components/emby/strings.json >/dev/null
          python -m json.tool custom_components/emby/translations/de.json >/dev/null
          python -m json.tool custom_components/emby/translations/en.json >/dev/null
          python -m json.tool hacs.json >/dev/null
          python - <<'PY'
          from pathlib import Path
          import yaml
          paths = [Path(".github/dependabot.yml")]
          paths.extend(sorted(Path(".github/workflows").glob("*.yml")))
          for path in paths:
              yaml.load(path.read_text(encoding="utf-8"), Loader=yaml.BaseLoader)
          PY
          python -m compileall -q custom_components/emby scripts tests
          mypy --ignore-missing-imports --follow-imports=skip \
            custom_components/emby/options_model.py \
            custom_components/emby/player_context.py \
            custom_components/emby/options_runtime.py
          ruff check .
          ruff format --check .
          pytest -q
          python scripts/validate_spec_contract.py
          python scripts/validate_stable_contract.py
          python scripts/secret_scan.py
      - name: Build and verify immutable assets
        run: |
          rm -rf dist
          python scripts/build_package.py \
            --output-dir dist \
            --expected-version "${{ steps.identity.outputs.version }}" \
            --commit "${GITHUB_SHA}"
          (cd dist && sha256sum --check embi.zip.sha256)
          test "$(cat dist/BUILD_COMMIT)" = "${GITHUB_SHA}"
      - uses: actions/upload-artifact@v4
        with:
          name: stable-assets-${{ github.sha }}
          path: |
            dist/embi.zip
            dist/embi.zip.sha256
            dist/BUILD_COMMIT
          if-no-files-found: error
          retention-days: 1

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hacs/action@main
        with:
          category: integration
          comment: false
          ignore: brands description license topics

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: home-assistant/actions/hassfest@master

  release:
    name: Publish and verify stable release
    needs: [validate-package, hacs, hassfest]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v5
        with:
          name: stable-assets-${{ github.sha }}
          path: dist
      - name: Reverify downloaded package
        run: |
          (cd dist && sha256sum --check embi.zip.sha256)
          test "$(cat dist/BUILD_COMMIT)" = "${GITHUB_SHA}"
      - name: Publish stable release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.validate-package.outputs.tag }}
          name: EMBi ${{ needs.validate-package.outputs.version }}
          files: |
            dist/embi.zip
            dist/embi.zip.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: false
          draft: false
          make_latest: true
      - name: Verify release, assets and provenance
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate-package.outputs.tag }}
          RELEASE_VERSION: ${{ needs.validate-package.outputs.version }}
        run: |
          set -euo pipefail
          json="$(gh release view "${RELEASE_TAG}" --json tagName,name,isDraft,isPrerelease,assets)"
          jq -e --arg tag "${RELEASE_TAG}" '.tagName == $tag' <<<"${json}" >/dev/null
          jq -e --arg name "EMBi ${RELEASE_VERSION}" '.name == $name' <<<"${json}" >/dev/null
          jq -e '.isDraft == false and .isPrerelease == false' <<<"${json}" >/dev/null
          jq -e '.assets | length == 2 and any(.name == "embi.zip") and any(.name == "embi.zip.sha256")' <<<"${json}" >/dev/null
          rm -rf verify-release
          mkdir verify-release
          gh release download "${RELEASE_TAG}" --dir verify-release --pattern embi.zip --pattern embi.zip.sha256
          (cd verify-release && sha256sum --check embi.zip.sha256)
          cmp dist/embi.zip verify-release/embi.zip
          cmp dist/embi.zip.sha256 verify-release/embi.zip.sha256
          test "$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)" = "${RELEASE_TAG}"
          git fetch --force origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          test "$(git rev-list -n 1 "${RELEASE_TAG}")" = "${GITHUB_SHA}"
