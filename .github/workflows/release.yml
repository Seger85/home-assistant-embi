name: Publish autonomous stable release

on:
  schedule:
    - cron: "47 4 * * *"
  workflow_dispatch:

concurrency:
  group: stable-release
  cancel-in-progress: false

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  publish:
    name: Prepare, publish and verify stable release
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out current main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Pin candidate release commit through protected pull request
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          echo "publish=false" >> "${GITHUB_OUTPUT}"

          base_sha="$(git rev-parse HEAD)"
          git fetch --no-tags origin main
          if [[ "$(git rev-parse FETCH_HEAD)" != "${base_sha}" ]]; then
            echo "A newer main commit exists; the next run will evaluate it."
            exit 0
          fi

          git fetch --force --tags origin
          current_version="$(python -I scripts/read_version.py)"
          current_tag="v${current_version}"

          if git show-ref --verify --quiet "refs/tags/${current_tag}"; then
            current_tag_sha="$(git rev-list -n 1 "${current_tag}")"
            if [[ "${current_tag_sha}" == "${base_sha}" ]]; then
              echo "Current main commit is already published as ${current_tag}."
              exit 0
            fi

            git merge-base --is-ancestor "${current_tag}" "${base_sha}"

            IFS='.' read -r major minor patch <<<"${current_version}"
            release_version="${major}.${minor}.$((patch + 1))"
            release_branch="release/automatic-v${release_version}"
            owner="${GITHUB_REPOSITORY_OWNER}"

            open_pr="$(
              gh api --method GET "repos/${GITHUB_REPOSITORY}/pulls" \
                -f state=open \
                -f base=main \
                -f head="${owner}:${release_branch}" \
                -f per_page=100 \
                --jq '.[0].number // empty'
            )"
            if [[ -n "${open_pr}" ]]; then
              echo "Release pull request #${open_pr} is already open."
              gh workflow run dependabot-automerge.yml --ref main -f pr_number="${open_pr}"
              exit 0
            fi

            prepared_version="$(
              python -I scripts/prepare_automatic_release.py \
                --expected-current "${current_version}"
            )"
            test "${prepared_version}" = "${release_version}"
            test "$(python -I scripts/read_version.py)" = "${release_version}"

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git checkout -B "${release_branch}"
            git add --all
            git diff --cached --quiet && {
              echo "::error::Automatic release preparation produced no changes."
              exit 1
            }
            git commit \
              -m "EMBi ${release_version}: automated stable release" \
              -m $'Publish all validated changes accumulated on main through the protected release pull-request path.\n\nSigned-off-by: Seger <Seger85@users.noreply.github.com>'
            git push --force-with-lease origin "HEAD:refs/heads/${release_branch}"

            existing_pr_json="$(
              gh api --method GET "repos/${GITHUB_REPOSITORY}/pulls" \
                -f state=all \
                -f base=main \
                -f head="${owner}:${release_branch}" \
                -f per_page=100
            )"
            existing_pr="$(
              jq -r '[.[] | select(.merged_at == null)] | first | .number // empty' \
                <<<"${existing_pr_json}"
            )"

            if [[ -n "${existing_pr}" ]]; then
              gh api --method PATCH \
                "repos/${GITHUB_REPOSITORY}/pulls/${existing_pr}" \
                -f state=open >/dev/null
              pr_number="${existing_pr}"
            else
              pr_error="$(mktemp)"
              if ! pr_json="$(
                gh api --method POST "repos/${GITHUB_REPOSITORY}/pulls" \
                  -f title="EMBi ${release_version}: automated stable release" \
                  -f head="${release_branch}" \
                  -f base=main \
                  -f body=$'Automated protected-branch release candidate for EMBi '"${release_version}"$'.\n\nThis pull request contains only the generated version identity and changelog update. It is merged automatically only after Quality, Test package, HACS validation, and Hassfest all succeed.\n\nSigned-off-by: Seger <Seger85@users.noreply.github.com>' \
                  2>"${pr_error}"
              )"; then
                error_text="$(cat "${pr_error}")"
                if grep -Eqi \
                  'not permitted to create|create and approve pull requests|Resource not accessible by integration' \
                  <<<"${error_text}"; then
                  gh api --method DELETE \
                    "repos/${GITHUB_REPOSITORY}/git/refs/heads/${release_branch}" \
                    >/dev/null 2>&1 || true
                  {
                    echo "## Autonomous release paused safely"
                    echo
                    echo "GitHub Actions may not create the protected release pull request yet."
                    echo "Enable **Settings → Actions → General → Workflow permissions → Allow GitHub Actions to create and approve pull requests** for this repository."
                    echo "The release branch was removed; the next scheduled run will retry automatically."
                  } >> "${GITHUB_STEP_SUMMARY}"
                  echo "::warning::Repository setting prevents GITHUB_TOKEN from creating the release pull request."
                  exit 0
                fi
                printf '%s\n' "${error_text}" >&2
                exit 1
              fi
              pr_number="$(jq -r '.number' <<<"${pr_json}")"
            fi

            echo "Prepared protected release pull request #${pr_number}."
            gh workflow run dependabot-automerge.yml --ref main -f pr_number="${pr_number}"
            exit 0
          fi

          grep -Eq "^## \[${current_version//./\.}\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md

          echo "publish=true" >> "${GITHUB_OUTPUT}"
          echo "base_sha=${base_sha}" >> "${GITHUB_OUTPUT}"
          echo "release_sha=${base_sha}" >> "${GITHUB_OUTPUT}"
          echo "version=${current_version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${current_tag}" >> "${GITHUB_OUTPUT}"

      - name: Install validation dependencies
        if: steps.plan.outputs.publish == 'true'
        run: python -m pip install -q --upgrade pip -r requirements_test.txt

      - name: Run complete quality and contract validation
        if: steps.plan.outputs.publish == 'true'
        run: |
          python -m json.tool custom_components/emby/manifest.json >/dev/null
          python -m json.tool custom_components/emby/strings.json >/dev/null
          python -m json.tool custom_components/emby/translations/de.json >/dev/null
          python -m json.tool custom_components/emby/translations/en.json >/dev/null
          python -m json.tool hacs.json >/dev/null
          python - <<'PY'
          from pathlib import Path
          import yaml

          paths = [Path(".github/dependabot.yml")]
          paths.extend(sorted(Path(".github/workflows").glob("*.yml")))
          for path in paths:
              yaml.load(path.read_text(encoding="utf-8"), Loader=yaml.BaseLoader)
          PY
          python -m compileall -q custom_components/emby scripts tests
          mypy --ignore-missing-imports --follow-imports=skip \
            custom_components/emby/options_model.py \
            custom_components/emby/player_context.py \
            custom_components/emby/options_runtime.py \
            custom_components/emby/registry_state.py \
            custom_components/emby/player_actions.py \
            custom_components/emby/player_reconciliation.py \
            custom_components/emby/sensor_registry.py
          ruff check .
          ruff format --check .
          pytest -q
          python scripts/validate_legacy_migration_contract.py
          python scripts/validate_stable_contract.py
          python scripts/validate_repository_references.py
          python scripts/secret_scan.py

      - name: HACS validation
        if: steps.plan.outputs.publish == 'true'
        uses: hacs/action@main
        with:
          category: integration
          comment: false
          ignore: brands description license topics

      - name: Hassfest
        if: steps.plan.outputs.publish == 'true'
        uses: home-assistant/actions/hassfest@master

      - name: Build and verify exact release assets
        if: steps.plan.outputs.publish == 'true'
        run: |
          rm -rf dist
          python scripts/build_package.py \
            --output-dir dist \
            --expected-version "${{ steps.plan.outputs.version }}" \
            --commit "${{ steps.plan.outputs.release_sha }}"
          (cd dist && sha256sum --check embi.zip.sha256)
          test "$(cat dist/BUILD_COMMIT)" = "${{ steps.plan.outputs.release_sha }}"

      - name: Confirm protected main release identity
        if: steps.plan.outputs.publish == 'true'
        env:
          BASE_SHA: ${{ steps.plan.outputs.base_sha }}
          RELEASE_SHA: ${{ steps.plan.outputs.release_sha }}
        run: |
          set -euo pipefail
          test "${BASE_SHA}" = "${RELEASE_SHA}"
          test "$(git rev-parse HEAD)" = "${RELEASE_SHA}"
          git fetch --no-tags origin main
          test "$(git rev-parse FETCH_HEAD)" = "${RELEASE_SHA}"

      - name: Create immutable tag
        if: steps.plan.outputs.publish == 'true'
        env:
          RELEASE_TAG: ${{ steps.plan.outputs.tag }}
          RELEASE_SHA: ${{ steps.plan.outputs.release_sha }}
          RELEASE_VERSION: ${{ steps.plan.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" "${RELEASE_SHA}" -m "EMBi ${RELEASE_VERSION}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Publish stable release
        if: steps.plan.outputs.publish == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.plan.outputs.tag }}
          name: EMBi ${{ steps.plan.outputs.version }}
          files: |
            dist/embi.zip
            dist/embi.zip.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: false
          draft: false
          make_latest: true

      - name: Verify release, assets and provenance
        if: steps.plan.outputs.publish == 'true'
        env:
          RELEASE_TAG: ${{ steps.plan.outputs.tag }}
          RELEASE_VERSION: ${{ steps.plan.outputs.version }}
          RELEASE_SHA: ${{ steps.plan.outputs.release_sha }}
        run: |
          set -euo pipefail
          json="$(gh release view "${RELEASE_TAG}" --json tagName,name,isDraft,isPrerelease,assets)"
          jq -e --arg tag "${RELEASE_TAG}" '.tagName == $tag' <<<"${json}" >/dev/null
          jq -e --arg name "EMBi ${RELEASE_VERSION}" '.name == $name' <<<"${json}" >/dev/null
          jq -e '.isDraft == false and .isPrerelease == false' <<<"${json}" >/dev/null
          jq -e '.assets | length == 2 and any(.name == "embi.zip") and any(.name == "embi.zip.sha256")' <<<"${json}" >/dev/null

          rm -rf verify-release
          mkdir verify-release
          gh release download "${RELEASE_TAG}" --dir verify-release \
            --pattern embi.zip --pattern embi.zip.sha256
          (cd verify-release && sha256sum --check embi.zip.sha256)
          cmp dist/embi.zip verify-release/embi.zip
          cmp dist/embi.zip.sha256 verify-release/embi.zip.sha256

          test "$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)" = "${RELEASE_TAG}"
          git fetch --force origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          test "$(git rev-list -n 1 "${RELEASE_TAG}")" = "${RELEASE_SHA}"
