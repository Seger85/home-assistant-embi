name: Publish stable release after merge

on:
  pull_request:
    types:
      - closed

concurrency:
  group: stable-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    name: Validate, publish and verify merged release
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact release commit
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Resolve immutable release identity without integration imports
        id: identity
        shell: bash
        env:
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          version="$(python -I scripts/read_version.py)"
          tag="v${version}"
          release_sha="${GITHUB_SHA}"

          test "${release_sha}" = "${MERGE_SHA}"
          [[ "${HEAD_BRANCH}" == "release/${version}" || "${HEAD_BRANCH}" == "release/${version}-final" ]]
          [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          grep -Eq "^## \[${version//./\.}\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md

          git fetch --no-tags origin main
          test "$(git rev-parse FETCH_HEAD)" = "${release_sha}"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Tag ${tag} already exists."
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "release_sha=${release_sha}" >> "${GITHUB_OUTPUT}"

      - name: Install validation dependencies
        run: python -m pip install -q --upgrade pip -r requirements_test.txt

      - name: Run complete quality and contract validation
        run: |
          python -m json.tool custom_components/emby/manifest.json >/dev/null
          python -m json.tool custom_components/emby/strings.json >/dev/null
          python -m json.tool custom_components/emby/translations/de.json >/dev/null
          python -m json.tool custom_components/emby/translations/en.json >/dev/null
          python -m json.tool hacs.json >/dev/null
          python - <<'PY'
          from pathlib import Path
          import yaml
          paths = [Path(".github/dependabot.yml")]
          paths.extend(sorted(Path(".github/workflows").glob("*.yml")))
          for path in paths:
              yaml.load(path.read_text(encoding="utf-8"), Loader=yaml.BaseLoader)
          PY
          python -m compileall -q custom_components/emby scripts tests
          mypy --ignore-missing-imports --follow-imports=skip \
            custom_components/emby/options_model.py \
            custom_components/emby/player_context.py \
            custom_components/emby/options_runtime.py \
            custom_components/emby/registry_state.py \
            custom_components/emby/player_actions.py \
            custom_components/emby/player_reconciliation.py \
            custom_components/emby/sensor_registry.py
          ruff check .
          ruff format --check .
          pytest -q
          python scripts/validate_legacy_migration_contract.py
          python scripts/validate_stable_contract.py
          python scripts/validate_repository_references.py
          python scripts/secret_scan.py

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          comment: false
          ignore: brands description license topics

      - name: Hassfest
        uses: home-assistant/actions/hassfest@master

      - name: Build and verify exact release assets
        run: |
          rm -rf dist
          python scripts/build_package.py \
            --output-dir dist \
            --expected-version "${{ steps.identity.outputs.version }}" \
            --commit "${{ steps.identity.outputs.release_sha }}"
          (cd dist && sha256sum --check embi.zip.sha256)
          test "$(cat dist/BUILD_COMMIT)" = "${{ steps.identity.outputs.release_sha }}"

      - name: Create immutable tag
        env:
          RELEASE_TAG: ${{ steps.identity.outputs.tag }}
          RELEASE_SHA: ${{ steps.identity.outputs.release_sha }}
          RELEASE_VERSION: ${{ steps.identity.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" "${RELEASE_SHA}" -m "EMBi ${RELEASE_VERSION}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Publish stable release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.identity.outputs.tag }}
          name: EMBi ${{ steps.identity.outputs.version }}
          files: |
            dist/embi.zip
            dist/embi.zip.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
          prerelease: false
          draft: false
          make_latest: true

      - name: Verify release, assets and provenance
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.identity.outputs.tag }}
          RELEASE_VERSION: ${{ steps.identity.outputs.version }}
          RELEASE_SHA: ${{ steps.identity.outputs.release_sha }}
        run: |
          set -euo pipefail
          json="$(gh release view "${RELEASE_TAG}" --json tagName,name,isDraft,isPrerelease,assets)"
          jq -e --arg tag "${RELEASE_TAG}" '.tagName == $tag' <<<"${json}" >/dev/null
          jq -e --arg name "EMBi ${RELEASE_VERSION}" '.name == $name' <<<"${json}" >/dev/null
          jq -e '.isDraft == false and .isPrerelease == false' <<<"${json}" >/dev/null
          jq -e '.assets | length == 2 and any(.name == "embi.zip") and any(.name == "embi.zip.sha256")' <<<"${json}" >/dev/null

          rm -rf verify-release
          mkdir verify-release
          gh release download "${RELEASE_TAG}" --dir verify-release \
            --pattern embi.zip --pattern embi.zip.sha256
          (cd verify-release && sha256sum --check embi.zip.sha256)
          cmp dist/embi.zip verify-release/embi.zip
          cmp dist/embi.zip.sha256 verify-release/embi.zip.sha256

          test "$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq .tag_name)" = "${RELEASE_TAG}"
          git fetch --force origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
          test "$(git rev-list -n 1 "${RELEASE_TAG}")" = "${RELEASE_SHA}"

      - name: Remove implementation branch after verified release
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: git push origin --delete "${HEAD_BRANCH}" || true
