name: EMBi 0.9 implementation finalizer

on:
  push:
    branches:
      - feature/embi-0.9.0
    paths:
      - .github/workflows/embi-09-finalize.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/embi-0.9.0
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install -q --upgrade pip -r requirements_test.txt
      - name: Synchronize branch and remove every temporary workflow
        run: |
          set -euo pipefail
          sleep 20
          git pull --ff-only origin feature/embi-0.9.0
          rm -f .github/workflows/embi-09-*.yml
      - name: Run complete pre-CI verification
        run: |
          python -m json.tool custom_components/emby/manifest.json >/dev/null
          python -m json.tool custom_components/emby/strings.json >/dev/null
          python -m json.tool custom_components/emby/translations/de.json >/dev/null
          python -m json.tool custom_components/emby/translations/en.json >/dev/null
          python -m compileall -q custom_components/emby scripts tests
          ruff check --fix --unsafe-fixes .
          ruff format .
          pytest -q
          python scripts/validate_spec_contract.py
          python scripts/validate_stable_contract.py
          python scripts/secret_scan.py
          rm -rf dist
          python scripts/build_package.py \
            --output-dir dist \
            --expected-version 0.9.0 \
            --commit "$(git rev-parse HEAD)"
          (cd dist && sha256sum --check embi.zip.sha256)
          test "$(cat dist/BUILD_COMMIT)" = "$(git rev-parse HEAD)"
          rm -rf dist
      - name: Commit finalized branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: finalize EMBi 0.9 implementation evidence"
          git push origin HEAD:feature/embi-0.9.0
