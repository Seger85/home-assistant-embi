name: Inspect EMBi 0.9.2 CI

on:
  pull_request:
    paths:
      - ".github/workflows/inspect-092-ci.yml"

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Extract current Quality and Hassfest errors
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for run_id in 29612807960 29612807959; do
            echo "=== RUN ${run_id} ==="
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs" \
              --jq '.jobs[] | select(.conclusion == "failure") | .id' |
            while read -r job_id; do
              [[ -n "${job_id}" ]] || continue
              gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs" > "job-${job_id}.log"
              grep -n -A12 -B8 -Ei 'SyntaxError|Error compiling|##\[error\]|fatal|failed|Invalid|Traceback' "job-${job_id}.log" | tail -n 180 || true
            done
          done
