name: Repair EMBi 0.9.2 generated source

on:
  pull_request:
    paths:
      - "scripts/fix_092_ci.py"
      - ".github/workflows/inspect-092-ci.yml"

permissions:
  contents: write
  pull-requests: read

jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Apply source correction
        run: python scripts/fix_092_ci.py
      - name: Commit corrected source
        run: |
          git config user.name "Seger"
          git config user.email "35084198+Seger85@users.noreply.github.com"
          git add custom_components/emby/options_flow.py
          git commit -m "fix: repair 0.9.2 options review rendering"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
