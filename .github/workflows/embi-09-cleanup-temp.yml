name: EMBi 0.9 temporary workflow cleanup

on:
  push:
    branches:
      - feature/embi-0.9.0
    paths:
      - .github/workflows/embi-09-cleanup-temp.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/embi-0.9.0
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install -q --upgrade pip -r requirements_test.txt
      - name: Wait for evidence commit and remove temporary workflows
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6; do
            git pull --ff-only origin feature/embi-0.9.0
            if grep -q 'EMBI-0.9-EVIDENCE-START' docs/specs/0.9.0/10-test-and-acceptance-matrix.md; then
              break
            fi
            if [[ "${attempt}" == "6" ]]; then
              echo "Evidence update has not completed yet."
              exit 1
            fi
            sleep 10
          done
          rm -f \
            .github/workflows/embi-09-style-fix.yml \
            .github/workflows/embi-09-diagnostic.yml \
            .github/workflows/embi-09-pytest-diagnostic.yml \
            .github/workflows/embi-09-evidence-update.yml \
            .github/workflows/embi-09-cleanup-temp.yml
          ruff check --fix --unsafe-fixes .
          ruff format .
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: remove temporary 0.9 implementation workflows"
          git push origin HEAD:feature/embi-0.9.0
