name: Inspect EMBi 0.9.2 generator

on:
  pull_request:
    paths:
      - ".github/workflows/inspect-092-generator.yml"

permissions:
  actions: read
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Show latest generator failure matches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/apply-embi-0.9.2.yml/runs?status=failure&per_page=1" --jq '.workflow_runs[0].id')"
          job_id="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs" --jq '.jobs[] | select(.conclusion == "failure") | .id' | head -n1)"
          echo "RUN=${run_id} JOB=${job_id}"
          gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs" > job.log
          grep -n -Ei 'error|fatal|rejected|remote:|denied|failed|nothing to commit|refusing|permission' job.log | tail -n 80 || true
          echo "inspection=run-8"
