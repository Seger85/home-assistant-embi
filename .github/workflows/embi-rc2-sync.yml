name: Synchronize EMBi rc2 branch

on:
  push:
    branches:
      - fix/rc2-runtime-safety
    paths:
      - ".github/workflows/embi-rc2-sync.yml"

permissions:
  contents: write

jobs:
  synchronize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out rc2 branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Merge current develop and resolve documented overlaps
        shell: bash
        env:
          CHANGELOG_GZ_B64: 
          ROADMAP_GZ_B64: 
          PROJECT_STATE_GZ_B64: 
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags origin develop:refs/remotes/origin/develop

          set +e
          git merge --no-commit --no-ff refs/remotes/origin/develop
          merge_status=$?
          set -e

          conflicts="$(git diff --name-only --diff-filter=U || true)"
          unexpected="$(printf '%s\n' "${conflicts}" | grep -v -E '^(CHANGELOG.md|ROADMAP.md|docs/PROJECT_STATE.md)$' || true)"
          if [[ -n "${unexpected}" ]]; then
            echo "::error::Unexpected merge conflicts:"
            printf '%s\n' "${unexpected}"
            exit 1
          fi
          if [[ ${merge_status} -ne 0 && -z "${conflicts}" ]]; then
            echo "::error::Merge failed without documented conflicts."
            exit 1
          fi

          printf '%s' "${CHANGELOG_GZ_B64}" | base64 --decode | gzip -dc > CHANGELOG.md
          printf '%s' "${ROADMAP_GZ_B64}" | base64 --decode | gzip -dc > ROADMAP.md
          printf '%s' "${PROJECT_STATE_GZ_B64}" | base64 --decode | gzip -dc > docs/PROJECT_STATE.md
          rm -f .github/workflows/embi-rc2-sync.yml
          git add -A

          if [[ -n "$(git diff --name-only --diff-filter=U)" ]]; then
            echo "::error::Unresolved merge conflicts remain."
            git diff --name-only --diff-filter=U
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install test dependencies
        run: python -m pip install --upgrade pip -r requirements_test.txt

      - name: Validate synchronized branch
        shell: bash
        run: |
          set -euo pipefail
          python -m json.tool custom_components/emby/manifest.json >/dev/null
          python -m json.tool custom_components/emby/strings.json >/dev/null
          python -m json.tool custom_components/emby/translations/de.json >/dev/null
          python -m json.tool custom_components/emby/translations/en.json >/dev/null
          python -m json.tool hacs.json >/dev/null
          python - <<'PY'
          from pathlib import Path
          import yaml
          paths = [Path('.github/dependabot.yml')]
          paths.extend(sorted(Path('.github/workflows').glob('*.yml')))
          for path in paths:
              yaml.load(path.read_text(encoding='utf-8'), Loader=yaml.BaseLoader)
          PY
          python -m compileall -q custom_components/emby
          ruff check .
          ruff format --check .
          pytest -q

      - name: Commit synchronized rc2 branch
        shell: bash
        run: |
          set -euo pipefail
          git commit -m "chore: sync rc2 with release governance"
          git push origin HEAD:fix/rc2-runtime-safety
