name: EMBi specification contract

on:
  pull_request:
    paths:
      - "docs/specs/0.9.0/**"
      - "scripts/validate_spec_contract.py"
      - ".github/workflows/spec-contract.yml"
  push:
    paths:
      - "docs/specs/0.9.0/**"
      - "scripts/validate_spec_contract.py"
      - ".github/workflows/spec-contract.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator dependency
        run: python -m pip install --disable-pip-version-check PyYAML==6.0.3

      - name: Validate frozen EMBi 0.9.0 contract
        run: python scripts/validate_spec_contract.py
