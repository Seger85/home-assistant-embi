name: Fix EMBi 0.9.2 style

on:
  pull_request:
    paths:
      - "scripts/fix_092_style.py"
      - ".github/workflows/fix-092-style.yml"

permissions:
  contents: write
  pull-requests: read

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Apply source-safe navigation and Ruff fixes
        run: |
          python scripts/fix_092_style.py
          python -m pip install -q ruff
          ruff check . --fix
          ruff format .
          python -m compileall -q custom_components/emby scripts tests
      - name: Commit non-workflow fixes
        run: |
          git config user.name "Seger"
          git config user.email "35084198+Seger85@users.noreply.github.com"
          git add -A -- ':!.github/workflows/**' ':!scripts/fix_092_style.py'
          git diff --cached --quiet && exit 0
          git commit -m "style: normalize EMBi 0.9.2 sources"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
