name: Format report

on:
  pull_request:

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install -q ruff==0.15.21
      - run: ruff format --check --diff . > format-report.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: format-report-${{ github.sha }}
          path: format-report.txt
          retention-days: 1
