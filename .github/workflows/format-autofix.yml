name: Format autofix

on:
  push:
    branches:
      - feature/stable-0.3.0

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/stable-0.3.0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install -q ruff==0.15.21
      - run: ruff format .
      - name: Commit formatted sources and remove temporary workflow
        run: |
          rm -f .github/workflows/format-autofix.yml .github/workflows/format-report.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: apply stable Ruff formatting"
          git push origin HEAD:feature/stable-0.3.0
