name: EMBi 0.9 test correction

on:
  push:
    branches:
      - feature/embi-0.9.0
    paths:
      - .github/workflows/embi-09-test-fix.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/embi-0.9.0
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install -q --upgrade pip -r requirements_test.txt
      - name: Correct assertion and verify locally
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("tests/test_player_actions_090.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              'update_position = remove_source.index("update_options_and_reload")',
              'update_position = remove_source.index("reloaded = await update_options_and_reload")',
          )
          path.write_text(text, encoding="utf-8")
          PY
          rm .github/workflows/embi-09-test-fix.yml
          ruff check --fix --unsafe-fixes .
          ruff format .
          pytest -q
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "test: correct 0.9 player action source assertion"
          git push origin HEAD:feature/embi-0.9.0
