name: One-shot canonical formatting

on:
  push:
    branches:
      - automation/autonomous-maintenance-1.0.3

permissions:
  contents: write

jobs:
  format:
    name: Apply Ruff 0.15.22 and remove formatter
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v7
        with:
          ref: automation/autonomous-maintenance-1.0.3
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Format and self-remove
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -q ruff==0.15.22
          ruff format .
          git rm .github/workflows/one-shot-format.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit \
            -m "Apply canonical Ruff formatting" \
            -m $'Format the autonomous maintenance implementation with the repository-pinned Ruff version and remove the one-shot formatter.\n\nSigned-off-by: Seger <Seger85@users.noreply.github.com>'
          git push origin HEAD:automation/autonomous-maintenance-1.0.3
