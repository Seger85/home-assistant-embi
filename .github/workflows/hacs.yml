name: HACS validation

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  official-hacs-validation:
    if: ${{ github.event.repository.private == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          comment: false
          ignore: brands description license topics

  private-repository-contract:
    if: ${{ github.event.repository.private == true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Explain private-repository validation mode
        run: |
          echo "::notice::The official HACS action cannot retrieve repository files from raw.githubusercontent.com while this repository is private. Running an equivalent local repository-contract check against the checked-out files instead."

      - name: Validate HACS repository contract locally
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path
          from urllib.parse import urlparse

          root = Path.cwd()

          def load_json(path: Path) -> dict:
              with path.open(encoding="utf-8") as handle:
                  value = json.load(handle)
              if not isinstance(value, dict):
                  raise TypeError(f"{path} must contain a JSON object")
              return value

          hacs_path = root / "hacs.json"
          if not hacs_path.is_file():
              raise FileNotFoundError("hacs.json is missing")

          hacs = load_json(hacs_path)
          allowed_hacs_keys = {
              "content_in_root",
              "country",
              "filename",
              "hacs",
              "hide_default_branch",
              "homeassistant",
              "name",
              "persistent_directory",
              "render_readme",
              "zip_release",
          }
          unknown_hacs_keys = sorted(set(hacs) - allowed_hacs_keys)
          if unknown_hacs_keys:
              raise ValueError(f"Unsupported hacs.json keys: {unknown_hacs_keys}")
          if not isinstance(hacs.get("name"), str) or not hacs["name"].strip():
              raise ValueError("hacs.json requires a non-empty string 'name'")
          for key in ("hacs", "homeassistant", "filename", "persistent_directory"):
              if key in hacs and not isinstance(hacs[key], str):
                  raise TypeError(f"hacs.json '{key}' must be a string")
          for key in ("content_in_root", "hide_default_branch", "render_readme", "zip_release"):
              if key in hacs and not isinstance(hacs[key], bool):
                  raise TypeError(f"hacs.json '{key}' must be a boolean")
          if hacs.get("zip_release") and not hacs.get("filename"):
              raise ValueError("zip_release requires filename")

          components_root = root / "custom_components"
          component_dirs = sorted(
              path
              for path in components_root.iterdir()
              if path.is_dir() and (path / "manifest.json").is_file()
          )
          if len(component_dirs) != 1:
              raise ValueError(
                  "HACS integration repositories require exactly one integration "
                  f"under custom_components; found {len(component_dirs)}"
              )

          component_dir = component_dirs[0]
          manifest = load_json(component_dir / "manifest.json")
          required_manifest_fields = {
              "codeowners": list,
              "documentation": str,
              "domain": str,
              "issue_tracker": str,
              "name": str,
              "version": str,
          }
          for key, expected_type in required_manifest_fields.items():
              value = manifest.get(key)
              if not isinstance(value, expected_type) or (
                  expected_type is str and not value.strip()
              ):
                  raise TypeError(
                      f"manifest.json '{key}' must be a non-empty "
                      f"{expected_type.__name__}"
                  )

          if manifest["domain"] != component_dir.name:
              raise ValueError(
                  "manifest domain must match the custom_components directory: "
                  f"{manifest['domain']!r} != {component_dir.name!r}"
              )
          for key in ("documentation", "issue_tracker"):
              parsed = urlparse(manifest[key])
              if parsed.scheme not in {"http", "https"} or not parsed.netloc:
                  raise ValueError(f"manifest.json '{key}' must be an HTTP(S) URL")

          print("Local HACS repository contract validation passed")
          PY
