name: HACS validation

on:
  push:
    branches:
      - main
      - develop
  pull_request:

concurrency:
  group: hacs-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Validate HACS repository
        uses: hacs/action@main
        with:
          category: integration
          comment: false
          ignore: brands description license topics
