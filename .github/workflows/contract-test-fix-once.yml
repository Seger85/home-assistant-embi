name: Update final EMBi contract tests once

on:
  push:
    branches:
      - feature/embi-0.9.0
    paths:
      - .github/workflows/contract-test-fix-once.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/embi-0.9.0
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Update diagnostics evidence
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/test_repository_contract.py")
          text = path.read_text(encoding="utf-8")
          old = '    assert "CONF_API_KEY" in diagnostics\n    assert "async_redact_data(dict(entry.data), {CONF_API_KEY})" in diagnostics\n'
          new = (
              '    assert "from homeassistant.const import CONF_API_KEY, CONF_HOST" in diagnostics\n'
              '    assert \'"title": "<redacted>"\' in diagnostics\n'
              '    assert "async_redact_data(dict(entry.data), {CONF_API_KEY, CONF_HOST})" in diagnostics\n'
          )
          if old not in text:
              raise RuntimeError("Expected diagnostics assertion block not found")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
      - name: Format and verify updated tests
        run: |
          python -m pip install -q --upgrade pip -r requirements_test.txt
          ruff format tests/test_repository_contract.py
          ruff check tests/test_repository_contract.py
      - name: Remove workflow and commit
        run: |
          rm .github/workflows/contract-test-fix-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "test: enforce server-connection diagnostics redaction"
          git push origin HEAD:feature/embi-0.9.0
