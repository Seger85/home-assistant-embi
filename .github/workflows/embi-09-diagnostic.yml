name: EMBi 0.9 contract diagnostic

on:
  pull_request:
    paths:
      - .github/workflows/embi-09-diagnostic.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Capture contract output
        run: |
          set +e
          {
            python scripts/validate_spec_contract.py
            echo "spec_status=$?"
            python scripts/validate_stable_contract.py
            echo "stable_status=$?"
          } > contract-output.txt 2>&1
          cat contract-output.txt
          test -s contract-output.txt
      - uses: actions/upload-artifact@v4
        with:
          name: embi-09-contract-diagnostic-${{ github.sha }}
          path: contract-output.txt
          retention-days: 1
