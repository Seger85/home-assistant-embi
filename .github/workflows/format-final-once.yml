name: Format final EMBi 0.9 implementation once

on:
  push:
    branches:
      - feature/embi-0.9.0
    paths:
      - .github/workflows/format-final-once.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/embi-0.9.0
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install -q --upgrade pip -r requirements_test.txt
      - name: Apply repository formatting
        run: |
          ruff format .
          ruff check .
      - name: Remove temporary workflow and commit formatting
        run: |
          rm .github/workflows/format-final-once.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "style: format final EMBi 0.9 implementation"
          git push origin HEAD:feature/embi-0.9.0
