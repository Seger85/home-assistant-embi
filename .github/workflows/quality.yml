name: Quality

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: Quality (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@v7
        with:
          show-progress: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Resolve version without integration imports
        run: |
          VERSION="$(python -I scripts/read_version.py)"
          test -n "${VERSION}"
          echo "EMBI_VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Install validation dependencies
        run: python -m pip install -q --upgrade pip -r requirements_test.txt

      - name: Validate JSON and YAML
        run: |
          python -m json.tool custom_components/emby/manifest.json >/dev/null
          python -m json.tool custom_components/emby/strings.json >/dev/null
          python -m json.tool custom_components/emby/translations/de.json >/dev/null
          python -m json.tool custom_components/emby/translations/en.json >/dev/null
          python -m json.tool hacs.json >/dev/null
          python - <<'PY'
          from pathlib import Path
          import yaml
          paths = [Path(".github/dependabot.yml")]
          paths.extend(sorted(Path(".github/workflows").glob("*.yml")))
          for path in paths:
              yaml.load(path.read_text(encoding="utf-8"), Loader=yaml.BaseLoader)
          PY

      - name: Compile Python
        run: python -m compileall -q custom_components/emby scripts tests

      - name: Static type check
        run: >-
          mypy --ignore-missing-imports --follow-imports=skip
          custom_components/emby/options_model.py
          custom_components/emby/player_context.py
          custom_components/emby/options_runtime.py
          custom_components/emby/registry_state.py
          custom_components/emby/player_actions.py
          custom_components/emby/player_reconciliation.py
          custom_components/emby/sensor_registry.py

      - name: Ruff lint
        run: ruff check .

      - name: Capture Ruff format check
        id: ruff_format
        shell: bash
        run: |
          set +e
          ruff format --check . > ruff-format-report.txt 2>&1
          status=$?
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          cat ruff-format-report.txt
          exit 0

      - name: Upload Ruff format report
        if: ${{ steps.ruff_format.outputs.status != '0' }}
        uses: actions/upload-artifact@v4
        with:
          name: ruff-format-report-${{ matrix.python-version }}-${{ github.sha }}
          path: ruff-format-report.txt
          if-no-files-found: error
          retention-days: 7

      - name: Enforce Ruff format
        if: ${{ steps.ruff_format.outputs.status != '0' }}
        run: exit 1

      - name: Capture unit and flow tests
        id: pytest
        shell: bash
        run: |
          set +e
          pytest -q > pytest-report.txt 2>&1
          status=$?
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          cat pytest-report.txt
          exit 0

      - name: Upload unit-test report
        if: ${{ steps.pytest.outputs.status != '0' }}
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report-${{ matrix.python-version }}-${{ github.sha }}
          path: pytest-report.txt
          if-no-files-found: error
          retention-days: 7

      - name: Enforce unit and flow tests
        if: ${{ steps.pytest.outputs.status != '0' }}
        run: exit 1

      - name: Validate legacy migration contract
        run: python scripts/validate_legacy_migration_contract.py

      - name: Validate stable contract
        run: python scripts/validate_stable_contract.py

      - name: Validate repository references
        run: python scripts/validate_repository_references.py

      - name: Secret and privacy scan
        run: python scripts/secret_scan.py

      - name: Build and verify release-equivalent asset
        run: |
          rm -rf dist
          python scripts/build_package.py \
            --output-dir dist \
            --expected-version "${EMBI_VERSION}" \
            --commit "${GITHUB_SHA}"
          (cd dist && sha256sum --check embi.zip.sha256)
          test "$(cat dist/BUILD_COMMIT)" = "${GITHUB_SHA}"
