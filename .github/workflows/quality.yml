name: Quality

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-contract-updates:
    if: ${{ github.head_ref == 'fix/embi-0.9.3' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: fix/embi-0.9.3
          fetch-depth: 0
          show-progress: false
      - name: Apply contract updates
        run: python .github/embi_093_fix2.py
      - name: Restore permanent workflow and remove patch
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/quality.yml
          rm -f .github/embi_093_fix2.py
      - name: Commit updates for regular CI
        run: |
          git config user.name "Seger"
          git config user.email "35084198+Seger85@users.noreply.github.com"
          git add -A
          git commit -m "test: align EMBi 0.9.3 behavior contracts" -m "Signed-off-by: Seger"
          git push origin HEAD:fix/embi-0.9.3
