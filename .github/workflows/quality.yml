name: Quality

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply-ci-corrections:
    if: ${{ github.head_ref == 'fix/embi-0.9.3' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: fix/embi-0.9.3
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - run: python -m pip install -q --upgrade pip -r requirements_test.txt
      - name: Apply corrections
        run: python .github/embi_093_fix1.py
      - name: Restore permanent workflow and remove patch
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/quality.yml
          rm -f .github/embi_093_fix1.py
      - name: Verify corrections
        run: |
          ruff format .
          ruff check .
          python -m compileall -q custom_components/emby scripts tests
          pytest -q
      - name: Commit corrections
        run: |
          git config user.name "Seger"
          git config user.email "35084198+Seger85@users.noreply.github.com"
          git add -A
          git commit -m "fix: resolve EMBi 0.9.3 static checks" -m "Signed-off-by: Seger"
          git push origin HEAD:fix/embi-0.9.3
