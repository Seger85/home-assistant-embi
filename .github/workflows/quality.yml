name: Quality

on:
  pull_request:

permissions:
  contents: write

jobs:
  bootstrap-implementation:
    if: ${{ github.head_ref == 'fix/embi-0.9.3' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: fix/embi-0.9.3
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements_test.txt
      - run: python -m pip install -q --upgrade pip -r requirements_test.txt
      - name: Apply implementation patch
        run: python .github/embi_093_patch.py
      - name: Restore permanent workflows and remove bootstrap files
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/quality.yml
          rm -f .github/embi_093_patch.py .github/workflows/embi-093-patch.yml
      - name: Format and lint
        run: |
          ruff format .
          ruff check . --fix
          ruff format --check .
          ruff check .
      - name: Compile and test
        run: |
          python -m compileall -q custom_components/emby scripts tests
          pytest -q
      - name: Validate contracts and package
        run: |
          python scripts/validate_spec_contract.py
          python scripts/validate_stable_contract.py
          python scripts/secret_scan.py
          rm -rf dist
          python scripts/build_package.py --output-dir dist --expected-version 0.9.3 --commit "bootstrap-validation"
          (cd dist && sha256sum --check embi.zip.sha256)
      - name: Commit implementation
        run: |
          git config user.name "Seger"
          git config user.email "35084198+Seger85@users.noreply.github.com"
          git add -A
          git commit -m "EMBi 0.9.3: Streamline player controls and cleanup UX [embi-093-applied]" -m "Signed-off-by: Seger"
          git push origin HEAD:fix/embi-0.9.3
