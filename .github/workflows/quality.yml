name: Quality

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  format_once:
    name: Canonical Ruff formatting
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'fix/reliable-autonomous-release'
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact pull-request head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Apply and commit repository-pinned Ruff formatting
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          python -m pip install -q "ruff==0.15.22"
          ruff format .
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit \
            -m "Apply canonical Ruff formatting" \
            -m $'Format the reliable autonomous release implementation.\n\nSigned-off-by: Seger <Seger85@users.noreply.github.com>'
          git push origin "HEAD:${HEAD_BRANCH}"

  tests:
    name: Quality (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.13"
          - "3.14"
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Resolve version without integration imports
        run: |
          VERSION="$(python -I scripts/read_version.py)"
          test -n "${VERSION}"

      - name: Install test dependencies
        run: python -m pip install -q --upgrade pip -r requirements_test.txt

      - name: Run full test suite
        run: pytest -q

  static:
    name: Static analysis and contracts
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Resolve version without integration imports
        run: |
          VERSION="$(python -I scripts/read_version.py)"
          test -n "${VERSION}"

      - name: Install validation dependencies
        run: python -m pip install -q --upgrade pip -r requirements_test.txt

      - name: Validate JSON and YAML
        run: |
          python -m json.tool custom_components/emby/manifest.json >/dev/null
          python -m json.tool custom_components/emby/strings.json >/dev/null
          python -m json.tool custom_components/emby/translations/de.json >/dev/null
          python -m json.tool custom_components/emby/translations/en.json >/dev/null
          python -m json.tool hacs.json >/dev/null
          python - <<'PY'
          from pathlib import Path
          import yaml

          paths = [Path(".github/dependabot.yml")]
          paths.extend(sorted(Path(".github/workflows").glob("*.yml")))
          for path in paths:
              yaml.load(path.read_text(encoding="utf-8"), Loader=yaml.BaseLoader)
          PY

      - name: Compile Python
        run: python -m compileall -q custom_components/emby scripts tests

      - name: Run MyPy
        run: >-
          mypy --ignore-missing-imports --follow-imports=skip
          custom_components/emby/options_model.py
          custom_components/emby/player_context.py
          custom_components/emby/options_runtime.py
          custom_components/emby/registry_state.py
          custom_components/emby/player_actions.py
          custom_components/emby/player_reconciliation.py
          custom_components/emby/sensor_registry.py

      - name: Run Ruff check
        run: ruff check .

      - name: Run Ruff format check
        run: ruff format --check .

      - name: Validate repository contracts
        run: |
          python scripts/validate_legacy_migration_contract.py
          python scripts/validate_stable_contract.py
          python scripts/validate_repository_references.py
          python scripts/secret_scan.py
