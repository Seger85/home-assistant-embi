name: Quality

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: Quality (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@v7
        with:
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements_test.txt
      - run: python -m pip install -q --upgrade pip -r requirements_test.txt
      - name: Validate JSON and YAML
        run: |
          python -m json.tool custom_components/emby/manifest.json >/dev/null
          python -m json.tool custom_components/emby/strings.json >/dev/null
          python -m json.tool custom_components/emby/translations/de.json >/dev/null
          python -m json.tool custom_components/emby/translations/en.json >/dev/null
          python -m json.tool hacs.json >/dev/null
          python - <<'PY'
          from pathlib import Path
          import yaml
          paths = [Path(".github/dependabot.yml")]
          paths.extend(sorted(Path(".github/workflows").glob("*.yml")))
          for path in paths:
              yaml.load(path.read_text(encoding="utf-8"), Loader=yaml.BaseLoader)
          PY
      - name: Compile Python
        run: python -m compileall -q custom_components/emby scripts tests
      - name: Capture Ruff lint result
        id: ruff
        shell: bash
        run: |
          set +e
          ruff check . --output-format concise > ruff-report.txt 2>&1
          status=$?
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          cat ruff-report.txt
          exit 0
      - name: Upload Ruff report
        if: ${{ steps.ruff.outputs.status != '0' }}
        uses: actions/upload-artifact@v7
        with:
          name: ruff-report-${{ matrix.python-version }}-${{ github.sha }}
          path: ruff-report.txt
          retention-days: 1
      - name: Enforce Ruff lint
        if: ${{ steps.ruff.outputs.status != '0' }}
        run: exit 1
      - name: Ruff format
        run: ruff format --check .
      - name: Unit tests
        run: pytest -q
      - name: Validate stable contract
        run: python scripts/validate_stable_contract.py
      - name: Secret and privacy scan
        run: python scripts/secret_scan.py
      - name: Build and verify release-equivalent asset
        run: |
          rm -rf dist
          python scripts/build_package.py --output-dir dist --expected-version 0.3.0 --commit "${GITHUB_SHA}"
          (cd dist && sha256sum --check embi.zip.sha256)
          test "$(cat dist/BUILD_COMMIT)" = "${GITHUB_SHA}"
