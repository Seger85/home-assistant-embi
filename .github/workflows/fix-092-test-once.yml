name: Fix EMBi 0.9.2 test expectation once

on:
  pull_request:
    paths:
      - "scripts/fix_092_test_expectation.py"
      - ".github/workflows/fix-092-test-once.yml"

permissions:
  contents: write
  pull-requests: read

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Align unchanged-apply flow expectation
        run: python scripts/fix_092_test_expectation.py
      - name: Commit corrected test
        run: |
          set -euo pipefail
          git config user.name "Seger"
          git config user.email "35084198+Seger85@users.noreply.github.com"
          git add tests/test_options_flow.py
          git diff --cached --quiet && exit 0
          git commit -m "test: align 0.9.2 review form expectation"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
