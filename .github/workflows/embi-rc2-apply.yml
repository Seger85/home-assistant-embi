name: Apply EMBi rc2 implementation

on:
  push:
    branches:
      - fix/rc2-runtime-safety
    paths:
      - ".github/workflows/embi-rc2-apply.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7

      - name: Reconstruct and verify implementation payload
        shell: bash
        run: |
          set -euo pipefail
          cat .embi-rc2/chunk-0.b64 \
              .embi-rc2/chunk-1.b64 \
              .embi-rc2/chunk-2.b64 \
              .embi-rc2/chunk-3.b64 > /tmp/embi-rc2.b64
          base64 --decode /tmp/embi-rc2.b64 > /tmp/embi-rc2.tar.gz
          echo "2235cf9a5172ca0f61cc6618151e155ed718459d4ef2fb7f95d6a3cbded4fc24  /tmp/embi-rc2.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/embi-rc2.tar.gz -C .
          rm -rf .embi-rc2
          rm -f .github/workflows/embi-rc2-apply.yml

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements_test.txt

      - name: Install test dependencies
        run: python -m pip install --upgrade pip -r requirements_test.txt

      - name: Validate implementation
        shell: bash
        run: |
          set -euo pipefail
          python -m json.tool custom_components/emby/manifest.json >/dev/null
          python -m json.tool custom_components/emby/strings.json >/dev/null
          python -m json.tool custom_components/emby/translations/de.json >/dev/null
          python -m json.tool custom_components/emby/translations/en.json >/dev/null
          python -m json.tool hacs.json >/dev/null
          python -m compileall -q custom_components/emby
          ruff check .
          ruff format --check .
          pytest -q

      - name: Commit verified changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: harden EMBi 0.3.0-rc2 runtime safety"
          git push origin HEAD:fix/rc2-runtime-safety
