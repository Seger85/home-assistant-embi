name: EMBi 0.9 style correction

on:
  push:
    branches:
      - feature/embi-0.9.0
    paths:
      - .github/workflows/embi-09-style-fix.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: feature/embi-0.9.0
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install -q --upgrade pip -r requirements_test.txt
      - name: Apply deterministic copy, fixture and style corrections
        run: |
          sed -i 's/0\.3\.0/0.9.0/g' tests/test_package_contract.py
          python - <<'PY'
          from pathlib import Path
          import json

          path = Path("tests/test_options_flow.py")
          text = path.read_text(encoding="utf-8")
          old = '        self.states = SimpleNamespace(get=lambda _entity_id: None)\n'
          new = (
              old
              + '        self.registry = SimpleNamespace(\n'
              + '            entities={},\n'
              + '            async_get=lambda _entity_id: None,\n'
              + '            async_update_entity=lambda _entity_id, **_kwargs: None,\n'
              + '        )\n'
          )
          if old in text and 'self.registry = SimpleNamespace(' not in text:
              path.write_text(text.replace(old, new), encoding="utf-8")

          english = {
              "title": "Older rules",
              "description": "{count} older rules could not be assigned safely during migration. They remain preserved and inactive until you review them. Deselect only rules you intentionally want to discard.",
              "data": {"kept_rules": "Preserved older rules"},
              "data_description": {
                  "kept_rules": "These labels deliberately avoid guessing a device or app identity."
              },
          }
          german = {
              "title": "Ältere Regeln",
              "description": "{count} ältere Regeln konnten während der Migration nicht sicher zugeordnet werden. Sie bleiben erhalten und inaktiv, bis du sie prüfst. Entferne nur Regeln, die du bewusst verwerfen möchtest.",
              "data": {"kept_rules": "Beibehaltene ältere Regeln"},
              "data_description": {
                  "kept_rules": "Diese Bezeichnungen ordnen absichtlich kein Gerät und keine App auf Verdacht zu."
              },
          }
          for filename, value in (
              ("custom_components/emby/strings.json", english),
              ("custom_components/emby/translations/en.json", english),
              ("custom_components/emby/translations/de.json", german),
          ):
              target = Path(filename)
              data = json.loads(target.read_text(encoding="utf-8"))
              data["options"]["step"]["older_rules"] = value
              target.write_text(
                  json.dumps(data, ensure_ascii=False, indent=2) + "\n",
                  encoding="utf-8",
              )
          PY
          ruff check --fix --unsafe-fixes .
          ruff format .
      - name: Commit corrections
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style: apply automated 0.9 formatting"
          git push origin HEAD:feature/embi-0.9.0
