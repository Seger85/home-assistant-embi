version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: main
    schedule:
      interval: daily
      time: "03:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    rebase-strategy: auto
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: "/"
    target-branch: main
    schedule:
      interval: daily
      time: "03:15"
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    rebase-strategy: auto
    groups:
      development-dependencies:
        patterns:
          - "*"
