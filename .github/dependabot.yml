version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: main
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: "/"
    target-branch: main
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    groups:
      development-dependencies:
        patterns:
          - "*"
