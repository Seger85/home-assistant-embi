version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: main
    schedule:
      interval: cron
      cronjob: "0 3 6 * *"
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    rebase-strategy: auto
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: "/"
    target-branch: main
    schedule:
      interval: cron
      cronjob: "15 3 6 * *"
      timezone: Europe/Berlin
    open-pull-requests-limit: 10
    rebase-strategy: auto
    groups:
      development-dependencies:
        patterns:
          - "*"
